<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Alex - Property Manager, orange hi-vis vest, hard hat, clipboard -->
  <ellipse cx="32" cy="62" rx="13" ry="3" fill="#000" opacity="0.2"/>
  <!-- Pants - cargo style -->
  <rect x="22" y="46" width="9" height="14" rx="2" fill="#546e7a"/>
  <rect x="33" y="46" width="9" height="14" rx="2" fill="#546e7a"/>
  <!-- Cargo pockets -->
  <rect x="23" y="50" width="5" height="4" rx="1" fill="#455a64"/>
  <rect x="36" y="50" width="5" height="4" rx="1" fill="#455a64"/>
  <!-- Boots -->
  <rect x="20" y="57" width="12" height="6" rx="2" fill="#4e342e"/>
  <rect x="32" y="57" width="12" height="6" rx="2" fill="#4e342e"/>
  <!-- Base shirt -->
  <rect x="18" y="28" width="28" height="20" rx="3" fill="#1565c0"/>
  <!-- Hi-vis vest -->
  <rect x="20" y="28" width="24" height="20" rx="2" fill="#f57f17"/>
  <!-- Vest reflective stripes -->
  <rect x="20" y="36" width="24" height="3" fill="#fff" opacity="0.7"/>
  <rect x="20" y="41" width="24" height="2" fill="#fff" opacity="0.5"/>
  <!-- Vest center opening (shirt visible) -->
  <rect x="28" y="28" width="8" height="20" fill="#1565c0"/>
  <!-- ID badge -->
  <rect x="29" y="33" width="6" height="8" rx="1" fill="#fff"/>
  <rect x="29" y="33" width="6" height="3" rx="1" fill="#0d47a1"/>
  <line x1="31" y1="37" x2="35" y2="37" stroke="#bbb" stroke-width="1"/>
  <line x1="31" y1="39" x2="34" y2="39" stroke="#bbb" stroke-width="1"/>
  <!-- Belt/tool belt -->
  <rect x="18" y="46" width="28" height="4" fill="#3e2723"/>
  <rect x="22" y="46" width="5" height="4" fill="#5d4037"/>
  <rect x="37" y="46" width="5" height="4" fill="#5d4037"/>
  <!-- Left arm -->
  <rect x="8" y="28" width="10" height="5" rx="2" fill="#f57f17"/>
  <ellipse cx="11" cy="35" rx="4" ry="3.5" fill="#FFCC80"/>
  <!-- Right arm + clipboard -->
  <rect x="46" y="28" width="10" height="5" rx="2" fill="#f57f17"/>
  <!-- Clipboard -->
  <rect x="46" y="33" width="14" height="17" rx="2" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
  <!-- Clipboard clip -->
  <rect x="50" y="30" width="6" height="5" rx="2" fill="#e64a19"/>
  <rect x="51" y="29" width="4" height="3" rx="1" fill="#bf360c"/>
  <!-- Lines on clipboard -->
  <line x1="48" y1="38" x2="58" y2="38" stroke="#9e9e9e" stroke-width="1.2"/>
  <line x1="48" y1="41" x2="58" y2="41" stroke="#9e9e9e" stroke-width="1.2"/>
  <line x1="48" y1="44" x2="55" y2="44" stroke="#9e9e9e" stroke-width="1.2"/>
  <text x="53" y="37" fill="#e64a19" font-size="5" font-family="Arial" font-weight="bold">✓</text>
  <!-- Neck -->
  <rect x="28" y="23" width="8" height="7" fill="#FFCC80"/>
  <!-- Head -->
  <circle cx="32" cy="16" r="13" fill="#FFCC80"/>
  <!-- Hard hat -->
  <ellipse cx="32" cy="8" rx="14" ry="7" fill="#ffd700"/>
  <rect x="18" y="10" width="28" height="4" rx="1" fill="#ffd700"/>
  <rect x="20" y="12" width="24" height="3" rx="1" fill="#ffb300"/>
  <!-- Brim of hard hat -->
  <rect x="16" y="13" width="32" height="3" rx="2" fill="#ffa000"/>
  <!-- Hard hat logo -->
  <text x="32" y="11" fill="#e65100" font-size="7" text-anchor="middle" font-family="Arial" font-weight="bold">A</text>
  <!-- Ears -->
  <ellipse cx="19" cy="18" rx="3" ry="4" fill="#f0b870"/>
  <ellipse cx="45" cy="18" rx="3" ry="4" fill="#f0b870"/>
  <!-- Eyes - friendly wide -->
  <circle cx="27" cy="18" r="2.5" fill="#1a1a1a"/>
  <circle cx="37" cy="18" r="2.5" fill="#1a1a1a"/>
  <circle cx="27.8" cy="17.2" r="1" fill="#fff"/>
  <circle cx="37.8" cy="17.2" r="1" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M23.5 13 Q27 11 30.5 13" stroke="#6d4c41" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M33.5 13 Q37 11 40.5 13" stroke="#6d4c41" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Friendly smile -->
  <path d="M26 23 Q32 28 38 23" stroke="#b06030" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="24" cy="21" rx="4" ry="2.5" fill="#ffab91" opacity="0.4"/>
  <ellipse cx="40" cy="21" rx="4" ry="2.5" fill="#ffab91" opacity="0.4"/>
</svg>
