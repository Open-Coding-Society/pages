<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0E2FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky2)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.85">
    <ellipse cx="150" cy="80" rx="70" ry="28"/>
    <ellipse cx="120" cy="80" rx="50" ry="22"/>
    <ellipse cx="190" cy="78" rx="50" ry="22"/>
    <ellipse cx="500" cy="60" rx="90" ry="32"/>
    <ellipse cx="460" cy="62" rx="60" ry="26"/>
    <ellipse cx="550" cy="58" rx="60" ry="26"/>
    <ellipse cx="900" cy="90" rx="80" ry="30"/>
    <ellipse cx="860" cy="90" rx="55" ry="24"/>
    <ellipse cx="950" cy="88" rx="55" ry="24"/>
  </g>

  <!-- Sun -->
  <circle cx="1100" cy="80" r="45" fill="#FFF176" opacity="0.95"/>
  <g stroke="#FFF176" stroke-width="3" opacity="0.7">
    <line x1="1100" y1="22" x2="1100" y2="8"/>
    <line x1="1100" y1="138" x2="1100" y2="152"/>
    <line x1="1042" y1="80" x2="1028" y2="80"/>
    <line x1="1158" y1="80" x2="1172" y2="80"/>
    <line x1="1059" y1="39" x2="1049" y2="29"/>
    <line x1="1141" y1="121" x2="1151" y2="131"/>
  </g>

  <!-- Distant hills -->
  <ellipse cx="200" cy="420" rx="300" ry="120" fill="#66BB6A" opacity="0.5"/>
  <ellipse cx="700" cy="440" rx="350" ry="110" fill="#81C784" opacity="0.4"/>
  <ellipse cx="1100" cy="430" rx="280" ry="100" fill="#66BB6A" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="450" width="1200" height="150" fill="url(#grass)"/>
  <!-- Sidewalk -->
  <rect x="0" y="450" width="1200" height="12" fill="#e0e0e0"/>

  <!-- Trees -->
  <g>
    <rect x="90" y="360" width="14" height="100" fill="#5D4037"/>
    <ellipse cx="97" cy="340" rx="38" ry="44" fill="#2E7D32"/>
    <ellipse cx="85" cy="355" rx="28" ry="32" fill="#388E3C"/>
    <rect x="280" y="370" width="12" height="90" fill="#5D4037"/>
    <ellipse cx="286" cy="350" rx="35" ry="40" fill="#1B5E20"/>
    <ellipse cx="272" cy="362" rx="25" ry="30" fill="#2E7D32"/>
    <rect x="760" y="365" width="14" height="95" fill="#5D4037"/>
    <ellipse cx="767" cy="345" rx="38" ry="42" fill="#2E7D32"/>
    <rect x="1000" y="358" width="12" height="102" fill="#5D4037"/>
    <ellipse cx="1006" cy="337" rx="36" ry="43" fill="#1B5E20"/>
  </g>

  <!-- House 1 (blue) -->
  <g transform="translate(120, 300)">
    <rect x="0" y="80" width="160" height="110" fill="#90CAF9"/>
    <polygon points="0,80 80,10 160,80" fill="#1565C0"/>
    <rect x="65" y="130" width="30" height="60" fill="#5D4037" rx="4"/>
    <rect x="10" y="95" width="35" height="35" fill="#FFF9C4" stroke="#1565C0" stroke-width="2"/>
    <line x1="27" y1="95" x2="27" y2="130" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="10" y1="112" x2="45" y2="112" stroke="#1565C0" stroke-width="1.5"/>
    <rect x="115" y="95" width="35" height="35" fill="#FFF9C4" stroke="#1565C0" stroke-width="2"/>
    <line x1="132" y1="95" x2="132" y2="130" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="115" y1="112" x2="150" y2="112" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Chimney -->
    <rect x="110" y="28" width="18" height="35" fill="#BF360C"/>
  </g>

  <!-- House 2 (yellow) -->
  <g transform="translate(380, 290)">
    <rect x="0" y="80" width="180" height="120" fill="#FFF9C4"/>
    <polygon points="0,80 90,5 180,80" fill="#F57F17"/>
    <rect x="70" y="140" width="40" height="60" fill="#4E342E" rx="4"/>
    <rect x="12" y="95" width="45" height="40" fill="#B3E5FC" stroke="#F57F17" stroke-width="2"/>
    <line x1="34" y1="95" x2="34" y2="135" stroke="#F57F17" stroke-width="1.5"/>
    <line x1="12" y1="115" x2="57" y2="115" stroke="#F57F17" stroke-width="1.5"/>
    <rect x="123" y="95" width="45" height="40" fill="#B3E5FC" stroke="#F57F17" stroke-width="2"/>
    <line x1="145" y1="95" x2="145" y2="135" stroke="#F57F17" stroke-width="1.5"/>
    <line x1="123" y1="115" x2="168" y2="115" stroke="#F57F17" stroke-width="1.5"/>
    <!-- Garage -->
    <rect x="0" y="120" width="60" height="80" fill="#e0e0e0"/>
    <rect x="4" y="126" width="52" height="68" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="1"/>
    <rect x="28" y="188" width="4" height="12" fill="#9e9e9e"/>
    <rect x="100" y="30" width="20" height="40" fill="#BF360C"/>
  </g>

  <!-- House 3 (white/gray) -->
  <g transform="translate(680, 295)">
    <rect x="0" y="75" width="200" height="125" fill="#f5f5f5"/>
    <polygon points="0,75 100,0 200,75" fill="#607D8B"/>
    <rect x="80" y="140" width="40" height="60" fill="#3E2723" rx="4"/>
    <rect x="14" y="90" width="50" height="45" fill="#E3F2FD" stroke="#607D8B" stroke-width="2"/>
    <line x1="39" y1="90" x2="39" y2="135" stroke="#607D8B" stroke-width="1.5"/>
    <line x1="14" y1="112" x2="64" y2="112" stroke="#607D8B" stroke-width="1.5"/>
    <rect x="136" y="90" width="50" height="45" fill="#E3F2FD" stroke="#607D8B" stroke-width="2"/>
    <line x1="161" y1="90" x2="161" y2="135" stroke="#607D8B" stroke-width="1.5"/>
    <line x1="136" y1="112" x2="186" y2="112" stroke="#607D8B" stroke-width="1.5"/>
    <rect x="115" y="22" width="18" height="38" fill="#BF360C"/>
  </g>

  <!-- House 4 (red brick) -->
  <g transform="translate(960, 305)">
    <rect x="0" y="70" width="170" height="115" fill="#EF9A9A"/>
    <g fill="#FFCDD2" opacity="0.6">
      <rect x="0" y="70" width="170" height="10"/><rect x="0" y="90" width="170" height="10"/>
      <rect x="0" y="110" width="170" height="10"/><rect x="0" y="130" width="170" height="10"/>
    </g>
    <polygon points="0,70 85,5 170,70" fill="#B71C1C"/>
    <rect x="65" y="125" width="40" height="60" fill="#3E2723" rx="4"/>
    <rect x="12" y="85" width="42" height="38" fill="#FFF9C4" stroke="#B71C1C" stroke-width="2"/>
    <line x1="33" y1="85" x2="33" y2="123" stroke="#B71C1C" stroke-width="1.5"/>
    <line x1="12" y1="104" x2="54" y2="104" stroke="#B71C1C" stroke-width="1.5"/>
    <rect x="116" y="85" width="42" height="38" fill="#FFF9C4" stroke="#B71C1C" stroke-width="2"/>
    <line x1="137" y1="85" x2="137" y2="123" stroke="#B71C1C" stroke-width="1.5"/>
    <line x1="116" y1="104" x2="158" y2="104" stroke="#B71C1C" stroke-width="1.5"/>
    <rect x="108" y="22" width="18" height="36" fill="#5D4037"/>
  </g>

  <!-- "FOR SALE" signs -->
  <g>
    <rect x="220" y="415" width="60" height="40" rx="4" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="247" y="453" width="6" height="20" fill="#5D4037"/>
    <text x="250" y="428" fill="#E53935" font-size="9" text-anchor="middle" font-family="Arial" font-weight="bold">FOR SALE</text>
    <text x="250" y="442" fill="#1565C0" font-size="8" text-anchor="middle" font-family="Arial">$145K-$1.4M</text>

    <rect x="840" y="410" width="60" height="40" rx="4" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="867" y="448" width="6" height="22" fill="#5D4037"/>
    <text x="870" y="423" fill="#E53935" font-size="9" text-anchor="middle" font-family="Arial" font-weight="bold">FOR SALE</text>
    <text x="870" y="437" fill="#1565C0" font-size="8" text-anchor="middle" font-family="Arial">Buy Now!</text>
  </g>

  <!-- Path/walkways -->
  <rect x="185" y="450" width="20" height="40" fill="#e0e0e0" opacity="0.7"/>
  <rect x="465" y="450" width="24" height="40" fill="#e0e0e0" opacity="0.7"/>
  <rect x="775" y="450" width="24" height="40" fill="#e0e0e0" opacity="0.7"/>
  <rect x="1040" y="450" width="20" height="40" fill="#e0e0e0" opacity="0.7"/>
</svg>
