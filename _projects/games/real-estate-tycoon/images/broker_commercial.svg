<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Marcus - Commercial Broker, sharp charcoal suit, confident -->
  <ellipse cx="32" cy="62" rx="13" ry="3" fill="#000" opacity="0.22"/>
  <!-- Legs -->
  <rect x="22" y="46" width="9" height="14" rx="2" fill="#1a1a2e"/>
  <rect x="33" y="46" width="9" height="14" rx="2" fill="#1a1a2e"/>
  <!-- Shoes -->
  <ellipse cx="26" cy="60" rx="7" ry="3" fill="#0d0d0d"/>
  <ellipse cx="38" cy="60" rx="7" ry="3" fill="#0d0d0d"/>
  <!-- Suit body - dark charcoal -->
  <rect x="18" y="28" width="28" height="20" rx="3" fill="#263238"/>
  <!-- Shirt - crisp white -->
  <rect x="28" y="28" width="8" height="16" fill="#fff"/>
  <!-- Tie - electric blue -->
  <polygon points="30,29 34,29 33.5,42 32,44 30.5,42" fill="#0d47a1"/>
  <rect x="30.5" y="34" width="3" height="3" fill="#1565c0"/>
  <!-- Lapels -->
  <polygon points="28,28 18,34 18,28" fill="#1c272c"/>
  <polygon points="36,28 46,34 46,28" fill="#1c272c"/>
  <!-- Belt -->
  <rect x="18" y="46" width="28" height="3" fill="#111"/>
  <rect x="28" y="46" width="8" height="3" fill="#546e7a"/>
  <!-- Left arm -->
  <rect x="8" y="28" width="10" height="5" rx="2" fill="#263238"/>
  <ellipse cx="11" cy="35" rx="4" ry="3.5" fill="#D7CCC8"/>
  <!-- Right arm - holding documents/folder -->
  <rect x="46" y="28" width="10" height="5" rx="2" fill="#263238"/>
  <!-- Document folder -->
  <rect x="46" y="33" width="15" height="12" rx="2" fill="#1565c0"/>
  <rect x="47" y="30" width="8" height="5" rx="1" fill="#0d47a1"/>
  <!-- Dollar sign on folder -->
  <text x="53" y="42" fill="#ffd700" font-size="8" text-anchor="middle" font-family="Arial" font-weight="bold">$</text>
  <!-- Pocket square -->
  <polygon points="21,29 23,29 22,33" fill="#b0bec5"/>
  <!-- Neck -->
  <rect x="28" y="23" width="8" height="7" fill="#D7CCC8"/>
  <!-- Head -->
  <circle cx="32" cy="16" r="13" fill="#D7CCC8"/>
  <!-- Hair - dark short sides -->
  <ellipse cx="32" cy="6" rx="11" ry="5" fill="#1a0a00"/>
  <ellipse cx="32" cy="9.5" rx="12.5" ry="6.5" fill="#2d1500"/>
  <!-- Ears -->
  <ellipse cx="19" cy="16" rx="3" ry="4" fill="#c0aca8"/>
  <ellipse cx="45" cy="16" rx="3" ry="4" fill="#c0aca8"/>
  <!-- Eyes - dark intense -->
  <circle cx="27" cy="16" r="2.5" fill="#0a0a0a"/>
  <circle cx="37" cy="16" r="2.5" fill="#0a0a0a"/>
  <circle cx="27.8" cy="15" r="1" fill="#fff"/>
  <circle cx="37.8" cy="15" r="1" fill="#fff"/>
  <!-- Eyebrows - strong -->
  <rect x="23" y="11" width="8" height="2.5" rx="1" fill="#1a0a00"/>
  <rect x="33" y="11" width="8" height="2.5" rx="1" fill="#1a0a00"/>
  <!-- Confident smirk -->
  <path d="M27 22 Q32 25 36 22" stroke="#9e6c50" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Stubble -->
  <rect x="25" y="23" width="14" height="4" rx="2" fill="#4e342e" opacity="0.2"/>
</svg>
