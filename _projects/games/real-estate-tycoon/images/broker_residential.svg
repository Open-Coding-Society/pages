<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Sarah - Residential Broker, green blazer, friendly -->
  <ellipse cx="32" cy="62" rx="13" ry="3" fill="#000" opacity="0.2"/>
  <!-- Skirt / lower body -->
  <rect x="20" y="44" width="24" height="16" rx="3" fill="#2e7d32"/>
  <!-- Shoes -->
  <ellipse cx="26" cy="61" rx="7" ry="3" fill="#1a1a1a"/>
  <ellipse cx="38" cy="61" rx="7" ry="3" fill="#1a1a1a"/>
  <!-- Blazer body -->
  <rect x="18" y="27" width="28" height="19" rx="3" fill="#388e3c"/>
  <!-- Shirt -->
  <rect x="28" y="27" width="8" height="14" fill="#fffde7"/>
  <!-- Scarf / necklace -->
  <path d="M28 29 Q32 34 36 29" stroke="#f57f17" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lapels -->
  <polygon points="28,27 18,32 18,27" fill="#2e7d32"/>
  <polygon points="36,27 46,32 46,27" fill="#2e7d32"/>
  <!-- Belt line -->
  <rect x="18" y="44" width="28" height="3" fill="#1b5e20"/>
  <!-- Left arm -->
  <rect x="8" y="27" width="10" height="5" rx="2" fill="#388e3c"/>
  <ellipse cx="11" cy="34" rx="4" ry="3.5" fill="#FFCCBC"/>
  <!-- Right arm - holding house keys -->
  <rect x="46" y="27" width="10" height="5" rx="2" fill="#388e3c"/>
  <ellipse cx="56" cy="34" rx="4" ry="3.5" fill="#FFCCBC"/>
  <!-- House icon keychain -->
  <polygon points="52,36 62,36 62,44 52,44" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <polygon points="50,38 57,32 64,38" fill="#f57f17"/>
  <rect x="55" y="39" width="4" height="5" fill="#8d6e63"/>
  <!-- Neck -->
  <rect x="28" y="22" width="8" height="7" fill="#FFCCBC"/>
  <!-- Head -->
  <circle cx="32" cy="15" r="13" fill="#FFCCBC"/>
  <!-- Hair - warm auburn bun -->
  <ellipse cx="32" cy="6" rx="11" ry="5" fill="#bf360c"/>
  <ellipse cx="32" cy="9" rx="13" ry="6" fill="#e64a19"/>
  <ellipse cx="32" cy="5" rx="7" ry="5" fill="#bf360c"/>
  <!-- Ears -->
  <ellipse cx="19" cy="15" rx="3" ry="4" fill="#f0a880"/>
  <ellipse cx="45" cy="15" rx="3" ry="4" fill="#f0a880"/>
  <!-- Earrings -->
  <circle cx="19" cy="19" r="2" fill="#f57f17"/>
  <circle cx="45" cy="19" r="2" fill="#f57f17"/>
  <!-- Eyes - warm brown -->
  <circle cx="27" cy="15" r="2.5" fill="#3e2723"/>
  <circle cx="37" cy="15" r="2.5" fill="#3e2723"/>
  <circle cx="27.8" cy="14.2" r="1" fill="#fff"/>
  <circle cx="37.8" cy="14.2" r="1" fill="#fff"/>
  <!-- Eyebrows - arched -->
  <path d="M23.5 10.5 Q27 9 30.5 10.5" stroke="#bf360c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M33.5 10.5 Q37 9 40.5 10.5" stroke="#bf360c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M26 21 Q32 27 38 21" stroke="#b05020" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="24" cy="19" rx="4" ry="2.5" fill="#ffab91" opacity="0.5"/>
  <ellipse cx="40" cy="19" rx="4" ry="2.5" fill="#ffab91" opacity="0.5"/>
</svg>
