  <g>
    <!-- Lamp 1 @ x=120 -->
    <rect x="119" y="420" width="4" height="72" fill="#8a8a9a"/>
    <path d="M121 420 Q121 406 137 404" stroke="#8a8a9a" stroke-width="3" fill="none"/>
    <ellipse cx="138" cy="403" rx="7" ry="5" fill="#fffde7" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="138" cy="403" rx="14" ry="8" fill="#ffd700" opacity="0.12"/>

    <!-- Lamp 2 @ x=340 -->
    <rect x="339" y="420" width="4" height="72" fill="#8a8a9a"/>
    <path d="M341 420 Q341 406 357 404" stroke="#8a8a9a" stroke-width="3" fill="none"/>
    <ellipse cx="358" cy="403" rx="7" ry="5" fill="#fffde7" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="358" cy="403" rx="14" ry="8" fill="#ffd700" opacity="0.12"/>

    <!-- Lamp 3 @ x=560 -->
    <rect x="559" y="420" width="4" height="72" fill="#8a8a9a"/>
    <path d="M561 420 Q561 406 577 404" stroke="#8a8a9a" stroke-width="3" fill="none"/>
    <ellipse cx="578" cy="403" rx="7" ry="5" fill="#fffde7" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="578" cy="403" rx="14" ry="8" fill="#ffd700" opacity="0.12"/>

    <!-- Lamp 4 @ x=780 -->
