    <rect x="1042" y="165" width="15" height="12"/><rect x="1093" y="165" width="14" height="12"/>
    <rect x="1067" y="190" width="15" height="12"/><rect x="1093" y="190" width="14" height="12"/>
  </g>

  <!-- BUILDING I - Far right edge -->
  <rect x="1145" y="155" width="55" height="335" fill="#101a30"/>
  <g fill="#4eff91" opacity="0.35">
    <rect x="1157" y="170" width="12" height="10"/>
    <rect x="1178" y="170" width="12" height="10"/>
    <rect x="1157" y="193" width="12" height="10"/>
    <rect x="1178" y="215" width="12" height="10"/>
  </g>

  <!-- === SIDEWALK (characters walk here, y=490 to y=540) === -->
