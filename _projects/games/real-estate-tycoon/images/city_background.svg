    <rect x="225" y="160" width="14" height="12"/><rect x="249" y="160" width="13" height="12"/>
    <rect x="177" y="186" width="14" height="12"/><rect x="225" y="186" width="14" height="12"/>
    <rect x="249" y="186" width="13" height="12"/>
    <rect x="201" y="212" width="14" height="12"/><rect x="249" y="212" width="13" height="12"/>
    <rect x="177" y="238" width="14" height="12"/><rect x="225" y="238" width="14" height="12"/>
