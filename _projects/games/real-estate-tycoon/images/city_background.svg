  <!-- Windows G -->
  <g fill="#64b5f6" opacity="0.45">
    <rect x="917" y="105" width="15" height="11"/><rect x="942" y="105" width="15" height="11"/>
    <rect x="968" y="105" width="15" height="11"/>
    <rect x="917" y="129" width="15" height="11"/><rect x="968" y="129" width="15" height="11"/>
    <rect x="942" y="153" width="15" height="11"/><rect x="968" y="153" width="15" height="11"/>
    <rect x="917" y="177" width="15" height="11"/><rect x="942" y="177" width="15" height="11"/>
