    <line x1="0" y1="515" x2="1200" y2="515"/>
    <line x1="150" y1="490" x2="150" y2="540"/>
    <line x1="300" y1="490" x2="300" y2="540"/>
    <line x1="450" y1="490" x2="450" y2="540"/>
    <line x1="600" y1="490" x2="600" y2="540"/>
    <line x1="750" y1="490" x2="750" y2="540"/>
    <line x1="900" y1="490" x2="900" y2="540"/>
    <line x1="1050" y1="490" x2="1050" y2="540"/>
  </g>

  <!-- === ROAD (y=540 to y=600) === -->
