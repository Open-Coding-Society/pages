    <circle cx="45" cy="30" r="1.5" opacity="0.9"/>
    <circle cx="120" cy="18" r="1" opacity="0.7"/>
    <circle cx="195" cy="42" r="2" opacity="0.8"/>
    <circle cx="290" cy="22" r="1.5" opacity="0.85"/>
    <circle cx="410" cy="38" r="1" opacity="0.7"/>
    <circle cx="530" cy="15" r="2" opacity="0.9"/>
    <circle cx="660" cy="44" r="1.5" opacity="0.75"/>
    <circle cx="760" cy="28" r="1" opacity="0.8"/>
    <circle cx="880" cy="20" r="2" opacity="0.85"/>
    <circle cx="980" cy="48" r="1.5" opacity="0.7"/>
    <circle cx="1090" cy="25" r="1" opacity="0.9"/>
    <circle cx="1160" cy="40" r="2" opacity="0.75"/>
    <circle cx="75" cy="80" r="1" opacity="0.6"/>
    <circle cx="240" cy="72" r="1.5" opacity="0.65"/>
    <circle cx="460" cy="65" r="1" opacity="0.7"/>
    <circle cx="610" cy="80" r="2" opacity="0.6"/>
    <circle cx="840" cy="70" r="1.5" opacity="0.65"/>
    <circle cx="1040" cy="85" r="1" opacity="0.7"/>
    <circle cx="350" cy="55" r="1" opacity="0.5"/>
    <circle cx="720" cy="60" r="1.5" opacity="0.55"/>
    <circle cx="950" cy="55" r="1" opacity="0.6"/>
  </g>

  <!-- Moon - top right -->
  <circle cx="1100" cy="65" r="34" fill="#fffde7" opacity="0.92"/>
  <circle cx="1114" cy="56" r="29" fill="#0d1a40"/>

  <!-- === BACKGROUND BUILDINGS (far, dark silhouette) === -->
  <g fill="#08112a" opacity="0.9">
    <rect x="0" y="200" width="55" height="400"/>
    <rect x="65" y="240" width="45" height="360"/>
    <rect x="120" y="180" width="70" height="420"/>
    <rect x="200" y="220" width="50" height="380"/>
    <rect x="260" y="195" width="65" height="405"/>
    <rect x="335" y="215" width="80" height="385"/>
    <rect x="425" y="170" width="60" height="430"/>
    <rect x="495" y="230" width="45" height="370"/>
    <rect x="550" y="185" width="75" height="415"/>
    <rect x="635" y="210" width="55" height="390"/>
    <rect x="700" y="190" width="70" height="410"/>
    <rect x="780" y="165" width="85" height="435"/>
    <rect x="875" y="205" width="50" height="395"/>
