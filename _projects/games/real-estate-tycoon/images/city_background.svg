  <circle cx="497" cy="117" r="18" fill="#1a3a5c" stroke="#ffd700" stroke-width="2" opacity="0.85"/>
  <text x="497" y="121" fill="#ffd700" font-size="12" text-anchor="middle" font-family="Arial,sans-serif">H</text>
  <!-- Windows D - amber -->
  <g fill="#ffd700" opacity="0.4">
    <rect x="452" y="135" width="16" height="12"/><rect x="478" y="135" width="16" height="12"/>
    <rect x="504" y="135" width="16" height="12"/><rect x="530" y="135" width="12" height="12"/>
    <rect x="452" y="160" width="16" height="12"/><rect x="504" y="160" width="16" height="12"/>
    <rect x="478" y="185" width="16" height="12"/><rect x="530" y="185" width="12" height="12"/>
