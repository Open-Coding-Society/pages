    <path d="M1001 420 Q1001 406 1017 404" stroke="#8a8a9a" stroke-width="3" fill="none"/>
    <ellipse cx="1018" cy="403" rx="7" ry="5" fill="#fffde7" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="1018" cy="403" rx="14" ry="8" fill="#ffd700" opacity="0.12"/>
