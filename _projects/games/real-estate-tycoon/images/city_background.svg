    <rect x="592" y="185" width="18" height="14"/><rect x="622" y="185" width="18" height="14"/>
    <rect x="652" y="185" width="18" height="14"/><rect x="682" y="185" width="18" height="14"/>
    <rect x="714" y="185" width="18" height="14"/>
    <rect x="592" y="213" width="18" height="14"/><rect x="652" y="213" width="18" height="14"/>
    <rect x="714" y="213" width="18" height="14"/>
    <rect x="622" y="241" width="18" height="14"/><rect x="682" y="241" width="18" height="14"/>
