  <text x="222" y="162" fill="#ffd700" font-size="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold">FIRST NATIONAL</text>

  <!-- BUILDING C - Skyscraper. NPC 3 (Marcus) stands ~x=400 -->
  <rect x="320" y="75" width="90" height="415" fill="#101e38"/>
