  <!-- Curb -->
  <rect x="0" y="540" width="1200" height="4" fill="#333"/>
  <!-- Road center lines -->
  <g fill="#ffd700" opacity="0.55">
    <rect x="0" y="565" width="90" height="5" rx="2"/>
    <rect x="130" y="565" width="90" height="5" rx="2"/>
    <rect x="260" y="565" width="90" height="5" rx="2"/>
    <rect x="390" y="565" width="90" height="5" rx="2"/>
    <rect x="520" y="565" width="90" height="5" rx="2"/>
    <rect x="650" y="565" width="90" height="5" rx="2"/>
    <rect x="780" y="565" width="90" height="5" rx="2"/>
    <rect x="910" y="565" width="90" height="5" rx="2"/>
    <rect x="1040" y="565" width="90" height="5" rx="2"/>
    <rect x="1110" y="565" width="90" height="5" rx="2"/>
  </g>
  <!-- White road edge lines -->
  <rect x="0" y="542" width="1200" height="2" fill="#fff" opacity="0.15"/>
  <rect x="0" y="596" width="1200" height="2" fill="#fff" opacity="0.1"/>

  <!-- === STREET LAMPS === -->
