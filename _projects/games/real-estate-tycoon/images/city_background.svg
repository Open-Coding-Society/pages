    <rect x="84" y="125" width="13" height="10"/><rect x="105" y="125" width="10" height="10"/>
    <rect x="42" y="148" width="13" height="10"/><rect x="84" y="148" width="13" height="10"/>
    <rect x="63" y="170" width="13" height="10"/><rect x="105" y="170" width="10" height="10"/>
    <rect x="42" y="193" width="13" height="10"/><rect x="63" y="193" width="13" height="10"/>
    <rect x="84" y="215" width="13" height="10"/><rect x="105" y="215" width="10" height="10"/>
    <rect x="42" y="237" width="13" height="10"/><rect x="84" y="237" width="13" height="10"/>
  </g>
  <!-- Antenna A -->
