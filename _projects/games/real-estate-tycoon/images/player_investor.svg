  <circle cx="27" cy="16" r="2.5" fill="#1a1a1a"/>
  <circle cx="37" cy="16" r="2.5" fill="#1a1a1a"/>
  <circle cx="28" cy="15" r="1" fill="#fff"/>
  <circle cx="38" cy="15" r="1" fill="#fff"/>
  <!-- Eyebrows -->
  <rect x="23.5" y="11.5" width="7" height="1.8" rx="1" fill="#2e1c0e"/>
  <rect x="33.5" y="11.5" width="7" height="1.8" rx="1" fill="#2e1c0e"/>
  <!-- Smile -->
  <path d="M26 22 Q32 27 38 22" stroke="#b06030" stroke-width="1.8" fill="none" stroke-linecap="round"/>
