  <rect x="22" y="46" width="9" height="14" rx="2" fill="#102040"/>
  <rect x="33" y="46" width="9" height="14" rx="2" fill="#102040"/>
  <!-- Shoes -->
  <ellipse cx="26" cy="60" rx="7" ry="3" fill="#0a0a0a"/>
  <ellipse cx="38" cy="60" rx="7" ry="3" fill="#0a0a0a"/>
  <!-- Suit body -->
  <rect x="18" y="28" width="28" height="20" rx="3" fill="#1a3a6e"/>
  <!-- Shirt -->
  <rect x="28" y="28" width="8" height="16" fill="#f0f4ff"/>
  <!-- Tie -->
  <polygon points="30,29 34,29 33.5,42 32,44 30.5,42" fill="#c62828"/>
  <!-- Lapels -->
