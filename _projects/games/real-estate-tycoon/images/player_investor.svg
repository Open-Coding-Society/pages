  <rect x="46" y="28" width="10" height="5" rx="2" fill="#1a3a6e"/>
  <rect x="47" y="33" width="14" height="10" rx="2" fill="#7a5c0a"/>
  <path d="M50 33 Q50 29 54 29 Q58 29 58 33" stroke="#7a5c0a" stroke-width="2" fill="none"/>
  <line x1="47" y1="38" x2="61" y2="38" stroke="#5a3e00" stroke-width="1"/>
  <!-- Neck -->
  <rect x="28" y="23" width="8" height="7" fill="#FFCC80"/>
  <!-- Head -->
  <circle cx="32" cy="16" r="13" fill="#FFCC80"/>
