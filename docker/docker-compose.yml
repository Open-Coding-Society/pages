# Isolated Pages stack — build and serve on the SERVER only (Docker).
# Does not use host ports 80/443 or install Ruby/Python on the host.
name: opencs-pages

services:
  pages:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: opencs-pages
    restart: unless-stopped
    ports:
      - "${PAGES_BIND:-127.0.0.1}:${PAGES_PORT:-8450}:4500"
    volumes:
      - ..:/app
      - opencs-bundle:/usr/local/bundle
      - opencs-venv:/app/venv
    environment:
      HOST: "0.0.0.0"
      PORT: "4500"
      # make = full build + auto-update on save (default)
      # dev  = faster dev mode (only :dev projects in .makeprojects)
      # serve = convert + serve, no file watchers
      MODE: "${MODE:-make}"
    networks:
      - pages-net

networks:
  pages-net:
    driver: bridge

volumes:
  opencs-bundle:
  opencs-venv:
