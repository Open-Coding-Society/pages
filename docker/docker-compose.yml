# Isolated Pages stack — does not use host ports 80/443 or install host packages.
# Project name keeps containers/volumes separate from other compose projects.
name: opencs-pages

services:
  # Serves a static copy of _site/ from ./site (sync from your Mac or make build).
  static:
    image: nginx:1.27-alpine
    container_name: opencs-pages-static
    restart: unless-stopped
    ports:
      - "${PAGES_BIND:-127.0.0.1}:${PAGES_HOST_PORT:-8450}:80"
    volumes:
      - ${PAGES_SITE_DIR:-./site}:/usr/share/nginx/html:ro
      - ./nginx-static.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pages-net

  # Full dev server with auto-update (make dev) — optional profile.
  dev:
    profiles: ["dev"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: opencs-pages-dev
    restart: unless-stopped
    ports:
      - "${PAGES_BIND:-127.0.0.1}:${PAGES_DEV_PORT:-8451}:4500"
    volumes:
      - ..:/app
      - opencs-bundle:/usr/local/bundle
      - opencs-venv:/app/venv
    environment:
      HOST: "0.0.0.0"
      PORT: "4500"
      MODE: "${MODE:-dev}"
    networks:
      - pages-net

networks:
  pages-net:
    driver: bridge

volumes:
  opencs-bundle:
  opencs-venv:
