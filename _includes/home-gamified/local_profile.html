<!-- Local Profile Status Widget
     Shows current local profile status and provides reset option
     Include this in your home-gamified game pages -->

<div id="home-local-profile-widget" style="display: none;">
  <div class="home-local-profile-badge" id="home-local-profile-toggle">
    <span>👤</span>
    <span id="home-local-profile-display-name">Local User</span>
  </div>

  <div class="home-local-profile-menu" id="home-local-profile-menu">
    <div class="home-local-profile-info">
      <strong>Profile</strong>
      <div id="home-local-profile-details"></div>
      <div class="home-local-id-text" id="home-local-profile-id"></div>
    </div>
    <div class="home-local-profile-actions">
      <button class="home-local-profile-btn" id="home-local-profile-export">
        📥 Export Profile
      </button>
      <button class="home-local-profile-btn danger" id="home-local-profile-reset">
        🔄 Start New Journey
      </button>
    </div>
  </div>
</div>

<script type="module">
  import LocalProfile from '{{site.baseurl}}/assets/js/pages/home-gamified/localProfile.js';

  const widget = document.getElementById('home-local-profile-widget');
  const badge = document.getElementById('home-local-profile-toggle');
  const menu = document.getElementById('home-local-profile-menu');
  const displayName = document.getElementById('home-local-profile-display-name');
  const details = document.getElementById('home-local-profile-details');
  const localIdText = document.getElementById('home-local-profile-id');
  const exportBtn = document.getElementById('home-local-profile-export');
  const resetBtn = document.getElementById('home-local-profile-reset');

  // Update widget display
  function updateWidget() {
    const profile = LocalProfile.getFlatProfile();
    
    if (profile) {
      widget.style.display = 'block';
      displayName.textContent = profile.name || 'Local User';
      
      details.innerHTML = `
        <div>Name: ${profile.name || 'Not set'}</div>
        <div>Email: ${profile.email || 'Not set'}</div>
        <div>GitHub: ${profile.github || 'Not set'}</div>
      `;
      
      localIdText.textContent = `ID: ${profile.localId}`;
    } else {
      widget.style.display = 'none';
    }
  }

  // Toggle menu
  badge.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('active');
  });

  // Close menu when clicking outside
  document.addEventListener('click', (e) => {
    if (!widget.contains(e.target)) {
      menu.classList.remove('active');
    }
  });

  // Export profile
  exportBtn.addEventListener('click', () => {
    const json = LocalProfile.export();
    if (json) {
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ocs-local-profile-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
  });

  // Reset profile
  resetBtn.addEventListener('click', () => {
    if (confirm('Are you sure you want to start a new journey? This will clear your current profile and progress.')) {
      LocalProfile.clear();
      menu.classList.remove('active');
      updateWidget();
      // Reload page to reset game state
      window.location.reload();
    }
  });

  // Initialize
  updateWidget();

  // Make updateWidget globally accessible for game integration
  window.updateLocalProfileWidget = updateWidget;
</script>
