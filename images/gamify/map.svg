<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b2230"/>
      <stop offset="1" stop-color="#07151f"/>
    </linearGradient>
    <pattern id="asphalt" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#172836"/>
      <path d="M0 32H64" stroke="#1f3a4d" stroke-width="2" opacity="0.55"/>
      <path d="M32 0V64" stroke="#1f3a4d" stroke-width="2" opacity="0.55"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="768" fill="url(#bg)"/>

  <!-- roads -->
  <rect x="0" y="320" width="1024" height="140" fill="url(#asphalt)"/>
  <rect x="460" y="0" width="140" height="768" fill="url(#asphalt)"/>

  <!-- lane markings -->
  <g stroke="#c7fff0" stroke-opacity="0.35" stroke-width="8" stroke-dasharray="30 22">
    <path d="M0 390H1024"/>
    <path d="M530 0V768"/>
  </g>

  <!-- simple buildings -->
  <g filter="url(#glow)">
    <rect x="70" y="80" width="260" height="170" rx="16" fill="#0c1a24" stroke="#39ffb6" stroke-opacity="0.35" stroke-width="6"/>
    <text x="200" y="150" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="26" fill="#e7fff7" opacity="0.85">CASINO</text>

    <rect x="70" y="500" width="320" height="170" rx="16" fill="#0c1a24" stroke="#00c2ff" stroke-opacity="0.35" stroke-width="6"/>
    <text x="230" y="590" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#e7fff7" opacity="0.85">STOCK BROKERAGE</text>

    <rect x="660" y="80" width="300" height="170" rx="16" fill="#0c1a24" stroke="#39ffb6" stroke-opacity="0.35" stroke-width="6"/>
    <text x="810" y="150" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#e7fff7" opacity="0.85">CRYPTO HUB</text>

    <rect x="660" y="500" width="300" height="170" rx="16" fill="#0c1a24" stroke="#00c2ff" stroke-opacity="0.35" stroke-width="6"/>
    <text x="810" y="590" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#e7fff7" opacity="0.85">BANK</text>
  </g>

  <!-- trees -->
  <g opacity="0.85">
    <circle cx="410" cy="150" r="26" fill="#123b2a"/><circle cx="410" cy="150" r="18" fill="#1c5b3f"/>
    <circle cx="610" cy="610" r="26" fill="#123b2a"/><circle cx="610" cy="610" r="18" fill="#1c5b3f"/>
    <circle cx="410" cy="610" r="26" fill="#123b2a"/><circle cx="410" cy="610" r="18" fill="#1c5b3f"/>
    <circle cx="610" cy="150" r="26" fill="#123b2a"/><circle cx="610" cy="150" r="18" fill="#1c5b3f"/>
  </g>
</svg>
