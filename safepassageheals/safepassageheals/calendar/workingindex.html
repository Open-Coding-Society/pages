<!-- FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet"/>
<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type ="module">
import {pythonURI, fetchOptions} from "{{ site.baseurl }}/assets/js/api/config.js";

document.addEventListener('DOMContentLoaded', async function() {
  const BACKEND = pythonURI;
// Check session and update user bar
  try {
    const res = await fetch(`${BACKEND}/api/id`, { credentials: 'include' });
    if (res.ok) {
      const user = await res.json();
      document.getElementById('user-greeting').textContent = `Hello, ${user.name || user.uid}`;
      document.getElementById('logout-btn').style.display = 'inline-block';

      // Show Edit Events button only for admins
      if (user.role === 'Admin') {
        document.getElementById('edit-events-btn').style.display = 'inline-block';
      }
    } else {
      document.getElementById('login-btn').style.display = 'inline-block';
    }
  } catch (_) {
    document.getElementById('login-btn').style.display = 'inline-block';
  }
  var calendarEl = document.getElementById('calendar');
  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
    },
    navLinks: true,
    selectable: true,
    selectMirror: true,
    dayMaxEvents: true,
    events: BACKEND + '/api/events',
    eventClick: function(info) {
      const e = info.event.extendedProps;
      const start = info.event.start;
      const end = info.event.end;
      const eventDescription = e.description || e.writeup || '';

      const formatDate = date => new Intl.DateTimeFormat('en-US', {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
      }).format(date);

      let timeText = '';
      if (start) {
        timeText = formatDate(start);
        if (end && end > start) {
          timeText += ` — ${formatDate(end)}`;
        }
      }

      document.getElementById('modal-title').textContent = info.event.title;
      document.getElementById('modal-time').textContent = timeText ? `Time: ${timeText}` : '';
      document.getElementById('modal-writeup').textContent = eventDescription;
      document.getElementById('modal-location').textContent = e.location ? 'Location: ' + e.location : '';

      const regLink = document.getElementById('modal-registration');
      if (e.registration) {
        regLink.href = e.registration;
        regLink.textContent = 'Register Here';
      } else {
        regLink.textContent = '';
      }

      const flyer = e.flyer || '/images/docx/Safe_Passage.png';
      const flyerPath = flyer.startsWith('/') ? flyer : '/' + flyer;
      document.getElementById('modal-image').style.backgroundImage = `url('${BACKEND}${flyerPath}')`;
      const modal = document.getElementById('event-modal');
      modal.style.display = 'flex';
    },
  });

  calendar.render();

  const modal = document.getElementById('event-modal');
  const closeButton = document.getElementById('modal-close');
  const overlay = document.getElementById('modal-overlay');

  const closeModal = () => {
    modal.style.display = 'none';
  };

  closeButton.addEventListener('click', closeModal);
  overlay.addEventListener('click', closeModal);
});
</script>
