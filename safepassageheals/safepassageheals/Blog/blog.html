<script type="module">
import { pythonURI } from "{{ site.baseurl }}/assets/js/api/config.js";

const BACKEND = pythonURI;
window.__BACKEND = BACKEND;

const POSTS_PER_PAGE = 10;
let allEvents = [];
let filteredEvents = [];
let currentPage = 1;
let activeCategory = 'all';

function stableId(raw, idx) {
  if (raw?.id != null && raw.id !== '') return String(raw.id);
  const t = (raw?.title || '').slice(0, 80);
  const s = raw?.start || raw?.date || '';
  return `${s}::${t}::${idx}`;
}

function show(el, on) {
  el.classList.toggle('sph-hidden', !on);
}

// Session
try {
  const res = await fetch(`${BACKEND}/api/id`, { credentials: 'include' });
  if (res.ok) {
    const user = await res.json();
    document.getElementById('user-greeting').textContent = `Hello, ${user.name || user.uid}`;
    show(document.getElementById('logout-btn'), true);
    if (user.role === 'Admin') show(document.getElementById('edit-events-btn'), true);
  } else {
    show(document.getElementById('login-btn'), true);
  }
} catch (_) {
  show(document.getElementById('login-btn'), true);
}

function formatDisplayDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (Number.isNaN(d.getTime())) return '';
  return new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'long', day: 'numeric' }).format(d);
}

function excerpt(text, len = 280) {
  if (!text) return '';
  const plain = String(text).replace(/\s+/g, ' ').trim();
  return plain.length > len ? plain.slice(0, len).trimEnd() + '…' : plain;
}

function flyerUrl(ev) {
  if (!ev.flyer) return '';
  const path = ev.flyer.startsWith('/') ? ev.flyer : `/${ev.flyer}`;
  return `${BACKEND}${path}`;
}

function syncCategoryUI() {
  document.querySelectorAll('.sph-cat').forEach(btn => {
    btn.classList.toggle('sph-cat--active', btn.dataset.cat === activeCategory);
  });
}

function applyFilter() {
  filteredEvents = activeCategory === 'all'
    ? [...allEvents]
    : allEvents.filter(ev => ev.category === activeCategory);
  currentPage = 1;
  renderList();
  renderPagination();
}

async function loadEvents() {
  const listEl = document.getElementById('blog-list');
  try {
    const res = await fetch(`${BACKEND}/api/events`, { credentials: 'include' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allEvents = (Array.isArray(data) ? data : []).map((raw, idx) => {
      const title = raw.title || 'Untitled Event';
      const start = raw.start || raw.date || '';
      const end = raw.end || '';
      const writeup =
        raw.writeup ||
        raw.extendedProps?.writeup ||
        raw.description ||
        raw.extendedProps?.description ||
        '';
      const location = raw.location || raw.extendedProps?.location || '';
      const registration = raw.registration || raw.extendedProps?.registration || '';
      const flyer = raw.flyer || raw.extendedProps?.flyer || '';
      const catRaw = raw.extendedProps?.category || raw.category || 'uncategorized';
      const category = String(catRaw).toLowerCase().replace(/\s+/g, '-');

      return {
        id: stableId(raw, idx),
        title,
        start,
        end,
        description: writeup,
        location,
        registration,
        flyer,
        category,
      };
    });

    allEvents.sort((a, b) => new Date(b.start) - new Date(a.start));
    syncCategoryUI();
    applyFilter();
  } catch (err) {
    listEl.innerHTML = `<p class="sph-error">Could not load events.<br><small>${err.message}</small></p>`;
  }
}

function renderList() {
  const list = document.getElementById('blog-list');
  const start = (currentPage - 1) * POSTS_PER_PAGE;
  const page = filteredEvents.slice(start, start + POSTS_PER_PAGE);

  if (page.length === 0) {
    list.innerHTML = '<p class="sph-empty">No posts in this category yet.</p>';
    return;
  }

  list.innerHTML = page.map(ev => {
    const imgSrc = flyerUrl(ev);
    const dateStr = formatDisplayDate(ev.start);
    const ex = excerpt(ev.description);

    return `
      <article class="sph-entry" data-id="${ev.id}">
        <div class="sph-entry__row">
          <div class="sph-entry__media">
            ${imgSrc
              ? `<img class="sph-entry__img" src="${imgSrc}" alt="" loading="lazy">`
              : `<div class="sph-entry__img sph-entry__img--placeholder" aria-hidden="true">No image</div>`
            }
          </div>
          <div class="sph-entry__text">
            <p class="sph-entry__date">${dateStr}</p>
            <h2 class="sph-entry__title"><a href="#" class="sph-entry__title-link" data-id="${ev.id}">${ev.title}</a></h2>
            ${ex ? `<p class="sph-entry__excerpt">${ex}</p>` : ''}
            <div class="sph-entry__actions">
              <a href="#" class="sph-entry__more" data-id="${ev.id}">read more</a>
            </div>
          </div>
        </div>
      </article>
    `;
  }).join('');

  list.querySelectorAll('.sph-entry__more, .sph-entry__title-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const id = a.dataset.id || a.closest('.sph-entry')?.dataset.id;
      openModal(id);
    });
  });
}

function renderPagination() {
  const total = Math.ceil(filteredEvents.length / POSTS_PER_PAGE);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }

  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
  const windowSize = 2;
  const startPage = clamp(currentPage - windowSize, 1, total);
  const endPage = clamp(currentPage + windowSize, 1, total);

  let html = '';
  html += `<button type="button" class="sph-page sph-page--nav ${currentPage === 1 ? 'sph-page--disabled' : ''}" data-page="${currentPage - 1}" aria-label="Previous page">&lsaquo;</button>`;

  const addPage = (i) => {
    html += `<button type="button" class="sph-page ${i === currentPage ? 'sph-page--active' : ''}" data-page="${i}">${i}</button>`;
  };
  const ell = () => { html += `<span class="sph-page-ell">…</span>`; };

  addPage(1);
  if (startPage > 2) ell();
  for (let i = Math.max(2, startPage); i <= Math.min(total - 1, endPage); i++) addPage(i);
  if (endPage < total - 1) ell();
  if (total > 1) addPage(total);

  html += `<button type="button" class="sph-page sph-page--nav ${currentPage === total ? 'sph-page--disabled' : ''}" data-page="${currentPage + 1}" aria-label="Next page">&rsaquo;</button>`;
  pag.innerHTML = html;

  pag.querySelectorAll('.sph-page').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('sph-page--disabled')) return;
      const target = parseInt(btn.dataset.page, 10);
      currentPage = clamp(target, 1, total);
      renderList();
      renderPagination();
      document.querySelector('.sph-blog-main')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function openModal(id) {
  const ev = allEvents.find(e => String(e.id) === String(id));
  if (!ev) return;

  const imgSrc = flyerUrl(ev);
  const wrap = document.getElementById('modal-image-wrap');
  const img = document.getElementById('modal-img');
  if (imgSrc) {
    wrap.style.display = 'block';
    img.src = imgSrc;
    img.alt = ev.title;
  } else {
    wrap.style.display = 'none';
    img.removeAttribute('src');
  }

  document.getElementById('modal-date').textContent = formatDisplayDate(ev.start);
  document.getElementById('modal-title').textContent = ev.title;

  const timeEl = document.getElementById('modal-time');
  if (ev.start) {
    const fmt = d => new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }).format(new Date(d));
    timeEl.textContent = ev.end ? `${fmt(ev.start)} — ${fmt(ev.end)}` : fmt(ev.start);
  } else {
    timeEl.textContent = '';
  }

  document.getElementById('modal-location').textContent = ev.location || '';
  document.getElementById('modal-description').textContent = (ev.description || '').trim();

  const reg = document.getElementById('modal-registration');
  if (ev.registration) {
    reg.href = ev.registration;
    reg.textContent = 'Register / learn more';
    reg.style.display = 'inline-block';
  } else {
    reg.removeAttribute('href');
    reg.style.display = 'none';
  }

  const modal = document.getElementById('event-modal');
  modal.style.display = 'flex';
  modal.setAttribute('aria-hidden', 'false');
}

function closeModal() {
  const modal = document.getElementById('event-modal');
  modal.style.display = 'none';
  modal.setAttribute('aria-hidden', 'true');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', closeModal);

function wireCategoryNav(container) {
  container.querySelectorAll('.sph-cat').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      syncCategoryUI();
      applyFilter();
    });
  });
}

wireCategoryNav(document.getElementById('category-tabs-top'));
wireCategoryNav(document.getElementById('category-tabs-bottom'));

loadEvents();
</script>
