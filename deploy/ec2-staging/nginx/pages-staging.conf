# ISOLATED staging vhost — does NOT modify default, spring, flask, or other sites.
# External URL: http://<EC2_PUBLIC_IP>:8450/
# Requires AWS security group inbound TCP 8450 (restrict to your IP if possible).

server {
    listen 8450;
    listen [::]:8450;
    server_name _;

    access_log /var/log/nginx/pages-staging.access.log;
    error_log  /var/log/nginx/pages-staging.error.log;

    location / {
        proxy_pass http://127.0.0.1:4500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
