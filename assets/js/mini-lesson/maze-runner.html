<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Runner - Graph Heuristics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
h1 { font-size: 1.3em; margin-bottom: 6px; color: #e94560; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
.controls button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.2s; }
.btn-algo { background: #16213e; color: #e94560; border: 2px solid #e94560; }
.btn-algo:hover, .btn-algo.active { background: #e94560; color: #fff; }
.btn-action { background: #0f3460; color: #53d8fb; border: 2px solid #53d8fb; }
.btn-action:hover { background: #53d8fb; color: #1a1a2e; }
.btn-wall { background: #16213e; color: #f5a623; border: 2px solid #f5a623; }
.btn-wall.active { background: #f5a623; color: #1a1a2e; }
.btn-weight { background: #16213e; color: #a29bfe; border: 2px solid #a29bfe; }
.btn-weight.active { background: #a29bfe; color: #1a1a2e; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; font-size: 0.75em; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-color { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #333; }
#grid { display: inline-grid; gap: 1px; background: #16213e; border: 2px solid #0f3460; border-radius: 4px; padding: 2px; cursor: pointer; }
.cell { width: 28px; height: 28px; border-radius: 3px; transition: background 0.15s; display: flex; align-items: center; justify-content: center; font-size: 0.65em; font-weight: 700; user-select: none; }
.cell-empty { background: #222244; }
.cell-wall { background: #e94560; }
.cell-weight { background: #a29bfe; }
.cell-start { background: #00b894; }
.cell-end { background: #fdcb6e; }
.cell-visited { background: #0f3460; }
.cell-path { background: #53d8fb; }
#stats { margin-top: 8px; font-size: 0.8em; text-align: center; min-height: 40px; }
.speed-control { display: flex; align-items: center; gap: 6px; font-size: 0.8em; margin-bottom: 6px; }
</style>
</head>
<body>

<h1>Maze Runner: Algorithm Race</h1>

<div class="legend">
  <div class="legend-item"><div class="legend-color" style="background:#00b894"></div> Start</div>
  <div class="legend-item"><div class="legend-color" style="background:#fdcb6e"></div> Goal</div>
  <div class="legend-item"><div class="legend-color" style="background:#e94560"></div> Wall</div>
  <div class="legend-item"><div class="legend-color" style="background:#a29bfe"></div> Weight (5x)</div>
  <div class="legend-item"><div class="legend-color" style="background:#0f3460"></div> Visited</div>
  <div class="legend-item"><div class="legend-color" style="background:#53d8fb"></div> Path</div>
</div>

<div class="controls">
  <button class="btn-algo active" id="btn-astar" onclick="selectAlgo('astar')">A*</button>
  <button class="btn-algo" id="btn-dijkstra" onclick="selectAlgo('dijkstra')">Dijkstra</button>
  <button class="btn-algo" id="btn-greedy" onclick="selectAlgo('greedy')">Greedy BFS</button>
  <button class="btn-wall active" id="btn-draw-wall" onclick="setDrawMode('wall')">Draw Walls</button>
  <button class="btn-weight" id="btn-draw-weight" onclick="setDrawMode('weight')">Draw Weights</button>
  <button class="btn-action" onclick="runAlgorithm()">Run</button>
  <button class="btn-action" onclick="raceAll()">Race All 3</button>
  <button class="btn-action" onclick="clearPath()">Clear Path</button>
  <button class="btn-action" onclick="clearAll()">Clear All</button>
  <button class="btn-action" onclick="generateMaze()">Random Maze</button>
</div>

<div class="speed-control">
  <label>Speed:</label>
  <input type="range" id="speed" min="1" max="100" value="50" style="width:120px;">
  <span id="speed-label">50ms</span>
</div>

<div id="grid"></div>
<div id="stats"></div>

<script>
const ROWS = 16, COLS = 26;
const WALL = 1, WEIGHT = 2, START = 3, END = 4;
let grid = [];
let startR = 1, startC = 1, endR = ROWS - 2, endC = COLS - 2;
let selectedAlgo = 'astar';
let drawMode = 'wall';
let isDrawing = false;
let isRunning = false;

function init() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  grid[startR][startC] = START;
  grid[endR][endC] = END;
  renderGrid();
}

function renderGrid() {
  const el = document.getElementById('grid');
  el.style.gridTemplateColumns = 'repeat(' + COLS + ', 28px)';
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + cellClass(grid[r][c]);
      cell.dataset.r = r;
      cell.dataset.c = c;
      if (grid[r][c] === WEIGHT) cell.textContent = '5';
      if (grid[r][c] === START) cell.textContent = 'S';
      if (grid[r][c] === END) cell.textContent = 'G';
      cell.addEventListener('mousedown', function(e) { e.preventDefault(); isDrawing = true; toggleCell(r, c); });
      cell.addEventListener('mouseenter', function() { if (isDrawing) toggleCell(r, c); });
      cell.addEventListener('mouseup', function() { isDrawing = false; });
      el.appendChild(cell);
    }
  }
}

function cellClass(v) {
  if (v === WALL) return 'cell-wall';
  if (v === WEIGHT) return 'cell-weight';
  if (v === START) return 'cell-start';
  if (v === END) return 'cell-end';
  return 'cell-empty';
}

function toggleCell(r, c) {
  if (grid[r][c] === START || grid[r][c] === END || isRunning) return;
  var val = drawMode === 'wall' ? WALL : WEIGHT;
  grid[r][c] = grid[r][c] === val ? 0 : val;
  var cell = getCellEl(r, c);
  cell.className = 'cell ' + cellClass(grid[r][c]);
  cell.textContent = grid[r][c] === WEIGHT ? '5' : '';
}

function getCellEl(r, c) {
  return document.getElementById('grid').children[r * COLS + c];
}

function selectAlgo(algo) {
  selectedAlgo = algo;
  document.querySelectorAll('.btn-algo').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('btn-' + algo).classList.add('active');
}

function setDrawMode(mode) {
  drawMode = mode;
  document.getElementById('btn-draw-wall').classList.toggle('active', mode === 'wall');
  document.getElementById('btn-draw-weight').classList.toggle('active', mode === 'weight');
}

function getDelay() { return 101 - document.getElementById('speed').value; }

document.getElementById('speed').addEventListener('input', function() {
  document.getElementById('speed-label').textContent = (101 - this.value) + 'ms';
});

function clearPath() {
  if (isRunning) return;
  var cells = document.querySelectorAll('.cell-visited, .cell-path');
  for (var i = 0; i < cells.length; i++) {
    var el = cells[i];
    var r = +el.dataset.r, c = +el.dataset.c;
    el.className = 'cell ' + cellClass(grid[r][c]);
    if (grid[r][c] === WEIGHT) el.textContent = '5';
    else if (grid[r][c] === START) el.textContent = 'S';
    else if (grid[r][c] === END) el.textContent = 'G';
    else el.textContent = '';
  }
  document.getElementById('stats').textContent = '';
}

function clearAll() {
  if (isRunning) return;
  init();
  document.getElementById('stats').textContent = '';
}

function generateMaze() {
  if (isRunning) return;
  grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
  grid[startR][startC] = START;
  grid[endR][endC] = END;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] !== 0) continue;
      var rand = Math.random();
      if (rand < 0.28) grid[r][c] = WALL;
      else if (rand < 0.35) grid[r][c] = WEIGHT;
    }
  }
  renderGrid();
}

function neighbors(r, c) {
  var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  var result = [];
  for (var i = 0; i < dirs.length; i++) {
    var nr = r + dirs[i][0], nc = c + dirs[i][1];
    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] !== WALL) {
      result.push([nr, nc]);
    }
  }
  return result;
}

function heuristic(r, c) {
  return Math.abs(r - endR) + Math.abs(c - endC);
}

function cost(r, c) {
  return grid[r][c] === WEIGHT ? 5 : 1;
}

function sleep(ms) { return new Promise(function(res) { setTimeout(res, ms); }); }

async function runSearch(algo, animate) {
  var open = [];
  var visited = {};
  var parent = {};
  var gScore = {};

  function key(r, c) { return r * COLS + c; }
  var startKey = key(startR, startC);

  gScore[startKey] = 0;
  var h0 = algo === 'dijkstra' ? 0 : heuristic(startR, startC);
  var f0 = algo === 'greedy' ? h0 : (0 + h0);
  open.push({r: startR, c: startC, f: f0});

  var nodesVisited = 0;

  while (open.length > 0) {
    open.sort(function(a, b) { return a.f - b.f; });
    var curr = open.shift();
    var ck = key(curr.r, curr.c);

    if (visited[ck]) continue;
    visited[ck] = true;
    nodesVisited++;

    if (animate && grid[curr.r][curr.c] !== START && grid[curr.r][curr.c] !== END) {
      getCellEl(curr.r, curr.c).className = 'cell cell-visited';
      if (getDelay() > 5) await sleep(getDelay());
    }

    if (curr.r === endR && curr.c === endC) {
      var path = [];
      var pk = ck;
      while (pk !== undefined && pk !== startKey) {
        path.push(pk);
        pk = parent[pk];
      }
      path.push(startKey);
      path.reverse();

      if (animate) {
        for (var i = 0; i < path.length; i++) {
          var pr = Math.floor(path[i] / COLS), pc = path[i] % COLS;
          if (grid[pr][pc] !== START && grid[pr][pc] !== END) {
            getCellEl(pr, pc).className = 'cell cell-path';
          }
          if (getDelay() > 5) await sleep(getDelay() / 2);
        }
      }
      return { found: true, nodesVisited: nodesVisited, pathLength: path.length, pathCost: gScore[ck] };
    }

    var nbrs = neighbors(curr.r, curr.c);
    for (var n = 0; n < nbrs.length; n++) {
      var nr = nbrs[n][0], nc = nbrs[n][1];
      var nk = key(nr, nc);
      if (visited[nk]) continue;

      var tentG = (gScore[ck] || 0) + cost(nr, nc);
      if (tentG < (gScore[nk] !== undefined ? gScore[nk] : Infinity)) {
        gScore[nk] = tentG;
        parent[nk] = ck;
        var h = algo === 'dijkstra' ? 0 : heuristic(nr, nc);
        var f = algo === 'greedy' ? h : (tentG + h);
        open.push({r: nr, c: nc, f: f});
      }
    }
  }
  return { found: false, nodesVisited: nodesVisited, pathLength: 0, pathCost: 0 };
}

async function runAlgorithm() {
  if (isRunning) return;
  isRunning = true;
  clearPath();
  var algoNames = { astar: 'A*', dijkstra: "Dijkstra's", greedy: 'Greedy BFS' };
  var result = await runSearch(selectedAlgo, true);
  if (result.found) {
    document.getElementById('stats').innerHTML =
      '<strong>' + algoNames[selectedAlgo] + '</strong> &mdash; Nodes visited: <strong>' + result.nodesVisited + '</strong> | Path length: <strong>' + result.pathLength + '</strong> | Path cost: <strong>' + result.pathCost + '</strong>';
  } else {
    document.getElementById('stats').innerHTML = '<strong>' + algoNames[selectedAlgo] + '</strong> &mdash; No path found!';
  }
  isRunning = false;
}

async function raceAll() {
  if (isRunning) return;
  isRunning = true;
  clearPath();

  var results = {};
  var algos = ['greedy', 'dijkstra', 'astar'];
  for (var i = 0; i < algos.length; i++) {
    results[algos[i]] = await runSearch(algos[i], false);
  }

  var algoNames = { astar: 'A*', dijkstra: "Dijkstra's", greedy: 'Greedy BFS' };
  var colors = { astar: '#53d8fb', dijkstra: '#00b894', greedy: '#e94560' };

  var html = '<strong>Race Results:</strong><br>';
  for (var j = 0; j < algos.length; j++) {
    var algo = algos[j];
    var r = results[algo];
    if (r.found) {
      html += '<span style="color:' + colors[algo] + '">' + algoNames[algo] + '</span>: Visited <strong>' + r.nodesVisited + '</strong> nodes, Path cost: <strong>' + r.pathCost + '</strong>, Path length: <strong>' + r.pathLength + '</strong><br>';
    } else {
      html += '<span style="color:' + colors[algo] + '">' + algoNames[algo] + '</span>: No path found<br>';
    }
  }

  // Find winner by fewest nodes visited
  var bestAlgo = null, bestVisited = Infinity;
  for (var k = 0; k < algos.length; k++) {
    if (results[algos[k]].found && results[algos[k]].nodesVisited < bestVisited) {
      bestVisited = results[algos[k]].nodesVisited;
      bestAlgo = algos[k];
    }
  }
  if (bestAlgo) {
    html += '<br>Winner (fewest nodes): <strong style="color:' + colors[bestAlgo] + '">' + algoNames[bestAlgo] + '</strong>';
    await runSearch('astar', true);
  }

  document.getElementById('stats').innerHTML = html;
  isRunning = false;
}

document.addEventListener('mouseup', function() { isDrawing = false; });
document.getElementById('speed-label').textContent = getDelay() + 'ms';
init();
</script>
</body>
</html>
