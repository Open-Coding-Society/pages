    description: "The Poway Symphony Orchestra is a community-based ensemble dedicated to bringing live orchestral music to local audiences. This capstone project reimagines the orchestra’s website as a modern digital experience that is easy to navigate, visually engaging, and accessible to a wide range of users. The project focuses on solving real usability issues such as unclear navigation, lack of engagement, and limited accessibility. Through research, prototyping, and iterative design, the final product creates a more welcoming and intuitive experience that helps users discover concerts, connect with musicians, and support the organization. This project demonstrates how thoughtful web design can strengthen community connection and expand audience reach."

