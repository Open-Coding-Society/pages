Title: "Poway Symphony Orchestra - Expanding Community Through Music"
Badge: "Design-Based Research Capstone"

Description: >
  This project redesigns the orchestra's website into a guided community journey.
  It introduces visitors to the mission, rewards exploration with an EXP bar,
  and makes it easier to discover concerts, musicians, and ways to support the orchestra.

Topics:
  - title: "Poway Symphony Orchestra - Connecting Community Through Live Music"
    subtitle: "Redesigned Website Experience"
    link: "https://pso.opencodingsociety.com/"
    buttonLabel: "View Frontend Site"
    backendLink: "http://wifighters.opencodingsociety.com"
    backendButtonLabel: "View Admin UI"

    description: >
      We rebuilt the site to follow a clear presentation arc: a mission-forward home page,
      an EXP bar that rewards engagement, a conductor section that deepens the story,
      an orchestra builder that turns exploration into interaction, and musician profiles
      with instrument audio that make the organization feel personal.

    keyPoints:
      - "Home page introduces the orchestra with a cleaner layout, clearer mission, and faster access to concerts, donations, and events"
      - "EXP bar gamifies every interaction so visitors can see progress as they move through the experience"
      - "Conductor section uses story-driven content to build trust while showing EXP growth through active engagement"
      - "Orchestra builder turns browsing into customization, giving users an interactive milestone instead of a static page"
      - "Meet the musicians section uses profile cards, instrument labels, and audio playback to fully reveal the orchestra's personality"
      - "Responsive layout keeps the full journey usable across phones, tablets, and desktops"
      - "Clear spacing, stronger visuals, and focused CTAs reduce friction for attendance and donations"

    tech:
      - "HTML"
      - "CSS"
      - "JavaScript"
      - "Responsive design"
      - "Figma for design and planning"
      - "User research and testing"
      - "Flask backend integration"

    interactiveElements:
      - title: "EXP Bar"
        description: "Visitors earn visible progress as they move through the site, turning browsing into a guided journey"
      - title: "Orchestra Builder"
        description: "Users interact with a customization feature that makes the experience feel participatory instead of static"
        link: "https://pso.opencodingsociety.com/games/"
        buttonLabel: "Open Games Page"
      - title: "Virtual Conductor"
        description: "A rhythm game that encourages the user to keep time the way a conductor guides an orchestra"
      - title: "Tuning The Orchestra"
        description: "Users experience what it is like to tune the orchestra before a performance or rehearsal so the ensemble sounds ready to play"
      - title: "Musician Profiles and Audio"
        description: "Visitors can explore member cards and click instruments to hear audio tied to each section"

    problemsSolved:
      - "Users did not have a strong guided journey -> we structured the site around a clear narrative flow from home page to musicians"
      - "The old site felt static -> we introduced the EXP bar and interactive milestones to reward engagement"
      - "Important actions were easy to miss -> we added clearer CTAs for concerts, tickets, and donations"
      - "The experience felt less personal -> we highlighted the conductor story, musician profiles, and instrument audio"
      - "Hard to use on phones -> we made the site work across all screen sizes"

    improvementsMade:
      - "Reorganized the site into a presentation-ready sequence that mirrors the capstone walkthrough"
      - "Added a visible EXP system so engagement is named as a feature, not hidden in the background"
      - "Used interactive cards, builder tools, and audio to make exploration feel hands-on"
      - "Made content easier to read with better spacing, stronger hierarchy, and clearer buttons"

    wowFactors:
      - "Home page leads with a polished, mission-forward layout that immediately feels more professional and intentional"
      - "EXP bar turns every click into visible progress, transforming a nonprofit site into a gamified experience"
      - "Conductor section deepens the narrative while showing that user engagement is actively rewarded"
      - "Orchestra builder adds a milestone interaction that makes customization part of the presentation"
      - "Musician profile cards with instrument audio fully reveal the orchestra through both visuals and sound"
      - "Live deployed capstone entry at /capstone/powayorchestra/ gives reviewers a direct path into the required walkthrough"
      - "Working Flask backend at http://wifighters.opencodingsociety.com proves the project is more than a static redesign"
      - "Clear CTA buttons and responsive design support real user behavior across devices, not just a demo flow"

status: "Research and Testing Phase (Deployed Prototype Complete)"

