    subtitle: "One Calendar. Every Event. Instantly."
    description: "Safe Passage Heals hosts workshops, support groups, and community events that help survivors of domestic violence access healing resources. Previously, event information was buried across static posts and flyers, making it hard for users to find upcoming programs. The Dynamic Event Calendar centralizes everything into one interactive monthly view — users browse by date and click any event to instantly see the flyer, full description, date and time, and a direct registration link. Built with FullCalendar.js on the frontend and a Flask + SQLite backend, the calendar fetches live event data via a REST API and presents it in a clean, accessible interface."
