  - title: "AI-Powered Task List Integration"
    image: "capstone/database_defenders.png"
    link: "/capstone/assignment-submission/"
    alt: "AI Task Extraction - Auto-generate task lists from channel messages"
    keyPoints:
      - "Claude API reads channel messages and detects action items"
      - "Personal task list per user with due dates and assignments"
      - "Real-time task_assigned socket event with toast notifications"
      - "Task status toggle: PENDING → IN_PROGRESS → DONE"
      - "Admin channel-level task overview with reassign and delete"
      - "All endpoints protected by JWT cookie auth"
    subtitle: "Surfacing Action Items Without Manual Tracking"
    description: "An AI layer integrated into the messaging platform that reads channel conversations and automatically generates, updates, and surfaces task lists for users. A Spring TaskService sends batched messages to Claude API using a structured prompt contract, extracts JSON task objects, and persists them in a Task entity. A task panel UI sits alongside the chat timeline and updates live via Socket.IO task_assigned events. Admins can view, reassign, and delete tasks across all users in a channel."
    tech:
      - "Claude API (Anthropic)"
      - "Spring Boot TaskService"
      - "Spring Task Entity / JPA"
      - "Socket.IO (task_assigned)"
      - "Jekyll JS Task Panel"
      - "JWT Cookie Auth"
    impact:
      - "Action items no longer buried in conversation history"
      - "Tasks auto-assigned and traceable to source message"
      - "Users notified in real-time when new tasks are detected"
      - "Admins can manage all tasks across a channel"
      - "No tasks leak across users — strict per-user visibility"
    status: "In Development"
    team:
      - "Anvay Vahia"
      - "Mihir Bapat"
      - "Yash Parikh"
