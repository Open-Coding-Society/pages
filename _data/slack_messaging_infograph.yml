# Assignment Resources Platform Capstone Infographic
Title: "Assignment Resources Platform Capstone"
Description: "A Design-Based Research capstone building an Assignment Resources platform using pages-tracking for the frontend and spring-tracking for the backend — featuring assignment-scoped URL/file resources, uploader metadata, and AI-assisted task extraction."

