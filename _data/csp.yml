# CSP course meta data
Sprint1:
  shared: "Onboarding"
  start: 0
  end: 4

  0:
    theme: "Code Runner Review"
    goals:
      - "Data Types: Strings, Numbers, and Booleans"
      - "Control Structures: Selection and Iteration"
      - "Modularization: Functions and Classes"

  1:
    theme: "Development Essentials"
    goals:
      - "Computing Environment: Operating Systems, Tools, and Projects"
      - "SDLC: Build, Test, Commit, and Deploy"
      - "GitHub Pages: Overview and Deployment"

  2:
    theme: "Agile Development"
    goals:
      - "Coding Challenge: Team Programming"
      - "Sprints: Planning, Execution, and Iteration"
      - "Tracking: Kanban Boards and Burndown Charts"

  3:
    theme: "CPT: 30% of the AP CSP Exam"
    goals:
      - "Challenge: Build a Full Stack Project"
      - "Frontend: JavaScript and Jekyll"
      - "Backend: Python and Flask"

  4:
    theme: "Team Programming"
    goals:
      - "Coordination: Scrum and Standups"
      - "Version Control: Repositories, Branching, and Pull Requests"
      - "Retrospective: Reflection and Improvement"


Sprint2:
  title: "Full Stack Foundations"
  description: >
    During this Sprint, students will explore the architecture of a Full Stack
    application and develop the technical foundations needed to build one.
    Students will blog their learning and participate in student-led lectures
    that reinforce programming concepts, AP CSP Big Ideas, and the technical
    principles required by the College Board.
  start: 5
  end: 8

  5:
    theme: "Full Stack Architecture"
    goals:
      - "AP CSP: Big Ideas and Essential Concepts"
      - "Frontend: User Interface Design"
      - "Backend: APIs and Databases"

  6:
    theme: "Frontend Development Foundations"
    goals:
      - "HTML, JavaScript, and the DOM"
      - "User Input and DOM Manipulation"
      - "APIs and Asynchronous Fetch"

  7:
    theme: "Backend and Data Foundations"
    goals:
      - "Data Serialization: JSON and Python Dictionaries"
      - "API Design: Defining Endpoints and Data Contracts"
      - "Data Modeling: SQLAlchemy and Relational Databases"

  8:
    theme: "CPT Checkpoint"
    goals:
      - "Algorithms and Efficiency"
      - "Randomization and Simulation"
      - "CPT Technical Review"
      - "Reflection and Improvement"


Sprint3:
  title: "Building a Full Stack Web Application"
  description: >
    During this Sprint, teams will apply their Full Stack knowledge to build
    a web application for a real audience and purpose. Each team will develop
    a website around a real-world interest while incorporating a JavaScript
    frontend, user interaction, and localStorage for persistent client-side
    data. By the end of the Sprint, students will have progressed from learning
    the architecture of a Full Stack application to building and presenting a
    working product at the Electives Department's Night at the Museum (N@tM).
  illustration: *web_dev_layers
  start: 9
  end: 12

  9:
    theme: "Interactive Features and Data"
    goals:
      - "Forms: Input Handling and Validation"
      - "Client-Side State: localStorage and User Preferences"
      - "APIs: Fetching and Working with Application Data"

  10:
    theme: "Integration and Testing"
    goals:
      - "Integration: Combining Team Contributions"
      - "User Experience: UX Refinement"
      - "Testing: End-to-End Application Testing"

  11:
    theme: "Project Polish and Presentation"
    goals:
      - "Code Review and Debugging"
      - "Documentation: README, Setup, and Usage"
      - "N@tM Presentation Practice"

  12:
    theme: "Night at the Museum (N@tM)"
    goals:
      - "Live Project Demonstration"
      - "Peer and Community Feedback"
      - "Sprint Retrospective"

Sprint4:
  title: "CPT Passion Project: Full Stack Development"
  description: >
    Trimester 2 will begin with the development of a Full Stack project
    designed for the Create Performance Task. Students will use CPT requirements,
    personal interests, ideation, and Project-Based Learning to develop a
    project using Python and Flask. Strong Full Stack projects combine a
    styled frontend, JavaScript interaction, backend APIs, and persistent data
    stored in a database. CPT project ideation should identify a meaningful
    problem or interest and describe how the frontend, backend, and database
    will work together to create a complete application.
  start: 13
  end: 16

  13:
    theme: "Flask Foundations and Security"
    goals:
      - "Flask: Routes, Requests, and Responses"
      - "Authentication: Login, Sessions, and Cookies"
      - "Data Access and Security"

  14:
    theme: "Backend API Development"
    goals:
      - "API Development: RESTful Endpoints with Flask"
      - "Development Tools: Postman, Debugging, and Error Handling"
      - "CPT Ideation: Designing a Full Stack Project"

  15:
    theme: "Database and Data Models"
    goals:
      - "Database Models: SQLite and SQLAlchemy"
      - "Data Operations: CRUD and API Endpoints"
      - "Data Modeling: Designing Persistent Application Data"

  16:
    theme: "Full Stack Integration"
    goals:
      - "CORS: Connecting Frontend and Backend"
      - "REST API Design Principles"
      - "Frontend-Backend Integration"
      - "Full Stack Localhost Pipeline"

Sprint5:
  title: "CPT Completion and Industry Transition"
  description: >
    Students will complete and document their Create Performance Task project
    while beginning the transition from student-owned development to professional
    client engagement. Students will deploy, test, document, and explain their
    applications while developing the technical vocabulary needed to describe
    how their systems work. Industry partners will provide feedback on student
    development practices and help students prepare for the transition to
    working directly with non-profit clients.
  start: 17
  end: 20

  17:
    theme: "Full Stack Deployment and Testing"
    goals:
      - "AWS EC2 Setup and Configuration"
      - "Database Backup and Restore"
      - "Full Stack Testing and Debugging"

  18:
    theme: "CPT Completion and Documentation"
    goals:
      - "Feature Refinement and Issue Burndown"
      - "Kanban Review and Improvement Planning"
      - "CPT Project Documentation"

  19:
    theme: "CPT Video and Written Response"
    goals:
      - "Create CPT Video Recording"
      - "Written Response Preparation"
      - "Code Commenting and Portfolio"

  20:
    theme: "Industry Partner Engagement and Transition"
    goals:
      - "Technical Project Demonstration"
      - "Teacher and Industry Feedback Integration"
      - "Professional Communication and Collaboration"

Sprint6:
  title: "Non-Profit Exploration and Ideation"
  description: >
    Students will transition from student-owned CPT projects to real-world
    non-profit engagement. Through ideation, prototyping, presentations, and
    conversations with non-profit partners, students will explore meaningful
    problems and possible technical solutions. Students will use low- and
    high-fidelity prototypes to communicate ideas, gather feedback, and prepare
    for future client development.
  start: 21
  end: 24

  21:
    theme: "Non-Profit Problem Discovery"
    goals:
      - "Understanding Non-Profit Needs"
      - "Brainstorming Project Ideas"
      - "Low-Fidelity Prototyping"

  22:
    theme: "Solution Exploration and Prototyping"
    goals:
      - "High-Fidelity Prototyping"
      - "Exploratory Development and Debugging"
      - "Preparation for Implementation"

  23:
    theme: "Professional Presentation Preparation"
    goals:
      - "N@tM Booth Setup Planning"
      - "Presentation Script and Practice"
      - "Crossover Peer Reviews and Feedback"

  24:
    theme: "N@tM Showcase and Non-Profit Engagement"
    goals:
      - "Live Project Demonstration"
      - "Community and Industry Feedback"
      - "Meetings with Non-Profit Partners"

Sprint7:
  title: "AI, Data, and Emerging Technology"
  description: >
    Students will explore artificial intelligence, machine learning, data
    processing, and emerging technologies as potential tools for solving
    real-world problems. Students will investigate how these technologies can
    be applied responsibly in non-profit contexts and will begin developing
    technical solutions based on identified needs and opportunities.
  start: 25
  end: 28

  25:
    theme: "AI and Machine Learning Foundations"
    goals:
      - "Algorithms and Data Processing"
      - "Machine Learning Concepts"
      - "AI Applications and Limitations"

  26:
    theme: "Data for Real-World Problems"
    goals:
      - "Data Collection and Preparation"
      - "Data Structures and Data Modeling"
      - "Data Analysis and Visualization"

  27:
    theme: "AI and Full Stack Integration"
    goals:
      - "AI APIs and Model Integration"
      - "Backend Services and Data Pipelines"
      - "Prototype Development"

  28:
    theme: "Technology Solutions and Client Planning"
    goals:
      - "Solution Demonstration"
      - "Client Feedback"
      - "Project Planning for Non-Profit Development"

Sprint8:
  title: "AP Review and Non-Profit Project Planning"
  description: >
    Students will complete targeted AP CSP review while continuing to prepare
    for non-profit project development. Student-led teaching will reinforce
    College Board concepts through examples drawn from the systems and projects
    students have built during the year. Remaining project time will be used to
    finalize requirements, technical plans, and development priorities for
    non-profit engagement.
  start: 29
  end: 32

Sprint9:
  title: "Non-Profit Development and Delivery"
  description: >
    Students will work with non-profit partners to develop, refine, and
    present technology solutions based on real-world needs. Teams will apply
    requirements gathering, Full Stack development, data management, testing,
    deployment, and professional communication throughout the development
    process. The year will conclude with final client demonstrations,
    documentation, reflection, and presentations of the work completed for
    non-profit partners.
  start: 33
  end: 37

  33:
    theme: "Non-Profit Development Sprint"
    goals:
      - "Core Feature Development"
      - "Client Communication"
      - "Iterative Testing"

  34:
    theme: "Full Stack Solution Development"
    goals:
      - "Frontend and Backend Integration"
      - "Database and Data Management"
      - "Feature Development"

  35:
    theme: "Client Feedback and Iteration"
    goals:
      - "Client Demonstration"
      - "Feedback Integration"
      - "Feature Refinement"

  36:
    theme: "Non-Profit Showcase and Reflection"
    goals:
      - "Final Client Demonstration"
      - "Community and Industry Feedback"
      - "N@tM Community Presentation"

  37:
    theme: "Final Delivery Preparation"
    goals:
      - "Production Testing"
      - "Documentation and Training"
      - "Final Client Delivery"

