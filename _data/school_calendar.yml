# School Calendar 2026-2027
# Poway Unified School District Calendar
# 180 Student Days
# 
# Week definitions:
# - monday: The Monday of the school week (when reading materials are assigned)
# - friday: The Friday of the school week (when assessments are due)
# - holidays: Optional list of holidays that fall on that week's Monday (materials move to Tuesday)
# - skip_week: true if the entire week is off (district recess, breaks)
#
# Note: Checkpoints for assessments are typically on Tuesday of the NEXT week

