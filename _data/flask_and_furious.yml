<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Event Calendar – Safe Passage Heals</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:    #1a7f74;
      --teal-lt: #e6f4f2;
      --coral:   #e8604c;
      --sand:    #f5f0e8;
      --ink:     #1c1c1c;
      --muted:   #6b7280;
      --white:   #ffffff;
      --border:  #d6cfc4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      background: var(--teal);
      color: var(--white);
      padding: 3rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.08) 0%, transparent 55%),
        radial-gradient(circle at 10% 90%, rgba(0,0,0,.12) 0%, transparent 50%);
    }
    .header-inner { max-width: 900px; margin: 0 auto; position: relative; }
    .badge {
      display: inline-block;
      background: var(--coral);
      color: var(--white);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .3rem .85rem;
      border-radius: 2rem;
      margin-bottom: 1.1rem;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      margin-bottom: .6rem;
    }
    .org-link { font-size: .9rem; color: rgba(255,255,255,.75); }
    .org-link a { color: rgba(255,255,255,.9); text-decoration: underline; }
    .leads { margin-top: 1.1rem; font-size: .85rem; color: rgba(255,255,255,.7); }
    .leads strong { color: var(--white); font-weight: 600; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      display: grid;
      gap: 1.5rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .12s; }
    .card:nth-child(3) { animation-delay: .19s; }
    .card:nth-child(4) { animation-delay: .26s; }
    .card:nth-child(5) { animation-delay: .33s; }

    .card-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: .55rem;
    }
    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      margin-bottom: .8rem;
      color: var(--ink);
    }
    .card p { font-size: .93rem; line-height: 1.7; color: #3a3a3a; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

    .bullet-list { list-style: none; margin-top: .6rem; display: flex; flex-direction: column; gap: .55rem; }
    .bullet-list li {
      display: flex; align-items: flex-start; gap: .65rem;
      font-size: .9rem; line-height: 1.55; color: #3a3a3a;
    }
    .bullet-list li::before {
      content: ''; flex-shrink: 0; width: 8px; height: 8px;
      border-radius: 50%; background: var(--coral); margin-top: .42rem;
    }

    .accent-teal  { border-left: 4px solid var(--teal);  background: var(--teal-lt); }
    .accent-coral { border-left: 4px solid var(--coral); background: #fdf2f0; }

    .flow { display: flex; flex-direction: column; gap: .5rem; margin-top: .8rem; }
    .flow-step { display: flex; align-items: center; gap: .9rem; font-size: .88rem; color: #3a3a3a; }
    .step-num {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--teal); color: var(--white);
      font-size: .78rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .flow-arrow { margin-left: 14px; font-size: .75rem; color: var(--muted); }

    .popup-preview {
      background: var(--sand); border: 1px dashed var(--border);
      border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem;
    }
    .popup-preview p { font-size: .8rem; color: var(--muted); margin-bottom: .55rem; font-style: italic; }
    .popup-tags { display: flex; flex-wrap: wrap; gap: .45rem; }
    .tag {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 6px; padding: .25rem .6rem; font-size: .78rem; color: var(--ink);
    }

    .impact-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-top: .8rem;
    }
    .impact-item {
      background: var(--teal-lt); border-radius: 12px; padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .35rem;
    }
    .impact-icon { font-size: 1.4rem; }
    .impact-item span { font-size: .83rem; line-height: 1.45; color: #2a5a55; font-weight: 500; }

    .stack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: .8rem; }
    .stack-box { background: var(--sand); border-radius: 10px; padding: .9rem 1rem; }
    .stack-box h4 {
      font-size: .8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .1em; color: var(--teal); margin-bottom: .5rem;
    }
    .stack-pills { display: flex; flex-wrap: wrap; gap: .35rem; }
    .pill {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 999px; padding: .2rem .65rem; font-size: .78rem; color: var(--ink);
    }

    footer { text-align: center; padding: 1.5rem 1rem 2rem; font-size: .8rem; color: var(--muted); }
    footer a { color: var(--teal); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="badge">Capstone Project</div>
    <h1>Dynamic Event Calendar</h1>
    <p class="org-link">Built for <a href="https://safepassageheals.org/" target="_blank" rel="noopener">Safe Passage Heals</a></p>
    <p class="leads"><strong>Project Leads:</strong> Ruchika Kench &nbsp;·&nbsp; Akshara Shankar &nbsp;·&nbsp; Avantika Chittari</p>
  </div>
</header>

<main>

  <div class="card">
    <div class="card-label">Project Overview</div>
    <h2>Centralizing Community Events</h2>
    <p>Safe Passage Heals hosts workshops, support groups, and community events that help survivors of domestic violence access healing resources and build supportive networks. The Dynamic Event Calendar moves all of this into one interactive interface — letting users browse by date and dive into event details with a single click.</p>
  </div>

  <div class="two-col">
    <div class="card accent-coral">
      <div class="card-label">Problem</div>
      <h2>Scattered &amp; Hard to Find</h2>
      <ul class="bullet-list">
        <li>Users must search through multiple pages to find upcoming programs</li>
        <li>Flyers and registration links are buried and not easily accessible</li>
        <li>Low event visibility limits community participation</li>
      </ul>
    </div>
    <div class="card accent-teal">
      <div class="card-label">Solution</div>
      <h2>Interactive Monthly Calendar</h2>
      <p style="margin-bottom:.75rem">Clicking any event opens a popup with:</p>
      <ul class="bullet-list">
        <li>Event flyer</li>
        <li>Event description</li>
        <li>Date and time</li>
        <li>Direct registration link</li>
      </ul>
      <div class="popup-preview">
        <p>Event popup preview</p>
        <div class="popup-tags">
          <span class="tag">📄 Flyer</span>
          <span class="tag">📝 Description</span>
          <span class="tag">🗓 Date &amp; Time</span>
          <span class="tag">🔗 Register</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">System Architecture</div>
    <h2>Frontend &amp; Backend</h2>
    <div class="stack-grid">
      <div class="stack-box">
        <h4>Frontend</h4>
        <div class="stack-pills">
          <span class="pill">HTML</span>
          <span class="pill">CSS</span>
          <span class="pill">JavaScript</span>
          <span class="pill">FullCalendar.js</span>
        </div>
      </div>
      <div class="stack-box">
        <h4>Backend &amp; Database</h4>
        <div class="stack-pills">
          <span class="pill">Flask</span>
          <span class="pill">SQLite</span>
          <span class="pill">REST API</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">User Flow</div>
    <h2>From Page Load to Registration</h2>
    <div class="flow">
      <div class="flow-step"><div class="step-num">1</div> User visits the Events Calendar page</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step"><div class="step-num">2</div> Calendar requests event data from Flask API</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step"><div class="step-num">3</div> Backend retrieves events from SQLite database</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step"><div class="step-num">4</div> Events appear on the interactive calendar</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step"><div class="step-num">5</div> Clicking an event opens a popup with full details &amp; registration link</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Impact</div>
    <h2>Why It Matters</h2>
    <div class="impact-grid">
      <div class="impact-item"><div class="impact-icon">📅</div><span>Centralizes all upcoming events in one place</span></div>
      <div class="impact-item"><div class="impact-icon">🔍</div><span>Makes event information easier to discover</span></div>
      <div class="impact-item"><div class="impact-icon">🔗</div><span>Provides direct registration access</span></div>
      <div class="impact-item"><div class="impact-icon">🤝</div><span>Encourages greater community participation</span></div>
      <div class="impact-item"><div class="impact-icon">✨</div><span>Creates a more organized, interactive experience</span></div>
    </div>
  </div>

</main>

<footer>
  Dynamic Event Calendar &nbsp;·&nbsp; <a href="https://safepassageheals.org/" target="_blank">safepassageheals.org</a>
</footer>

</body>
</html>