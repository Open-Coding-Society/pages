# PVO Infographic
Title: "Poway Veterans Organization (PVO)"
Description: "Three purpose-built tools that transform how veterans receive help, how volunteers get started, and how questions get answered — turning powayveterans.org into a clear, compassionate local support portal."

Topics:
  - title: "Get Help Hub"
    image: "capstone/poway-veterans-logo.png"
    gif: "helphub.gif"
    link: "https://powayveterans.org/request-assistance/"
    before_link: "https://powayveterans.org/request-assistance/"
    alt: "PVO Get Help Hub - Veteran Support Pathway"
    beforePoints:
      - "Veterans complete a lengthy form before learning whether they even qualify — wasting their time and energy"
      - "No document checklist means submissions arrive incomplete, triggering rounds of follow-up"
      - "Volunteers spend valuable time tracking down missing information instead of delivering aid"
      - "Avoidable delays push response times further out, leaving veterans waiting when they need help most"
      - "No guidance after submission — veterans are left wondering what happens next and when to expect a reply"
    keyPoints:
      - "Eligibility clarified in seconds — all six assistance categories clearly explained"
      - "Covers rent, utilities, food, transportation, home repair, and emergency hardship"
      - "Document checklist presented before the form — no more incomplete submissions"
      - "Response time expectations communicated clearly from the very first visit"
      - "Mobile-friendly design built for veterans applying under difficult circumstances"
      - "Urgent and external resources surfaced for situations requiring immediate action"
      - "Privacy-first language that establishes trust from the opening line"
      - "A clear three-step pathway from 'Do I qualify?' to a fully submitted request"
    subtitle: "A Clear, Compassionate Pathway for Every Veteran in Need"
    description: "A thoughtfully structured landing page that answers every critical question before a veteran ever fills out a form — reducing uncertainty, eliminating incomplete submissions, and helping more people reach the support they deserve. Veterans are guided through a simple three-step journey: confirm eligibility, gather the right documents, and submit with confidence."
    tech:
      - "Eligibility Guide"
      - "Document Checklist"
      - "Step-by-Step Flow"
      - "Mobile Optimized"
      - "Local Resource Links"

  - title: "Volunteer Onboarding"
    image: "capstone/poway-veterans-logo.png"
    gif: "volunteer.gif"
    link: "https://powayveterans.org/volunteer/"
    before_link: "https://powayveterans.org/volunteer/"
    alt: "PVO Volunteer Onboarding Form Redesign"
    beforePoints:
      - "No roles or responsibilities listed — volunteers sign up with no idea what they will actually be doing"
      - "No time commitment guidance leaves people unprepared, contributing to no-shows and early drop-off"
      - "Vague language creates uncertainty around required skills and expected level of involvement"
      - "No dedicated path for group or corporate volunteers, making coordinated sign-ups unnecessarily difficult"
      - "Without clear expectations set upfront, enthusiasm fades before the first shift begins"
    keyPoints:
      - "Opens with the opportunity — role types and real-world impact presented before the sign-up form"
      - "Six role categories clearly defined: home repair, events, outreach, administration, transport, and skilled trades"
      - "Time commitment and skill expectations listed per role so volunteers arrive fully prepared"
      - "A dedicated pathway for group and corporate volunteer coordination"
      - "Sign-up form takes under two minutes — nothing to slow momentum or cause abandonment"
      - "Every submission is connected to a real story of a veteran helped"
      - "Giving options included for supporters who want to contribute beyond their time"
      - "Designed to serve first-time and returning volunteers equally well"
    subtitle: "Lead with the Opportunity — Then Earn the Sign-Up"
    description: "A volunteer experience redesigned around clarity and commitment. Role types, time expectations, and genuine impact stories are presented before anyone is asked to sign up — so every volunteer arrives informed and ready to contribute. The form itself takes under two minutes, removing every barrier between intention and action."
    tech:
      - "Role Descriptions"
      - "Time Commitment Guide"
      - "Streamlined Form"
      - "Group Sign-Up Support"
      - "Impact Storytelling"

