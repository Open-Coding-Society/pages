      - "Present at N@tM"
      - "Collect Feedback"
      - "Plan Next Steps on Game Design"
Sprint4:
  title: Ideating, Tinkering, Building and OOP
  description: Explore the OCS GameEngine—a platform designed to make learning computer science both fun and accesible. You will work collaboratively, build games, and apply key programming concepts in a creative, team-based environment.
  start: 13
  end: 16
Sprint5:
  title: Advanced Features
  description: The Teacher will be providing topics such as local storage, leaderboard APIs, websockets, platformer and more to add to the game.  Students will be expected to learn these topics and implement them into to OCS game.  
  start: 17
  end: 20
Sprint6:
  title: An RPG/Platformer game.
  description: Trimester 2 concludes with students presenting their project at N@tM. Each person within "Student Teams" will have their own specialty within the student project. Students should be able to talk about design, make a plan, code, blog, and present features of their portion of the system.
  start: 21
  end: 24
