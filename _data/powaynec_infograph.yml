# Poway NEC Capstone Infographic
Title: "Binary Beasts: Poway NEC"
Description: "Redesigning powaynec.com so Poway residents can find emergency preparedness information faster — cleaner navigation, mobile-ready, and personalized for volunteers and coordinators."

Topics:
  - title: "Poway Neighborhood Emergency Corps"
    image: "capstone/powaynec.png"
    link: "https://powaynec.com/"
    alt: "Poway NEC website preview"
    keyPoints:
      - "Idea 1: Streamline volunteer onboarding so new members can find their role and take action in one visit."
      - "Idea 2: Move emergency resources to top-level navigation — one tap away, not buried 4 clicks deep."
      - "Idea 3: Build reusable page templates for events, drills, and contacts so the site stays consistent."
      - "Problem solved: Residents can't find urgent preparedness info fast enough on the current site."
      - "Problem solved: Volunteers don't know where to start — the onboarding journey is unclear."
      - "Problem solved: Pages look inconsistent and break when content editors make updates."
    subtitle: "Emergency Info That Works When You Need It Most"
    description: "The current PNEC site fails on mobile and buries critical resources under too many clicks. We are rebuilding it with a mobile-first design, action-first navigation, and a searchable resource directory. We are also adapting our existing OCS user management and login system specifically for PNEC — replacing the generic login with a PNEC-branded portal. Volunteers log in and see their neighborhood dashboard, coordinators can manage their local pages, and admins control the full site. Public visitors access all preparedness info without needing an account."
    tech:
      - "Jekyll — structured static site with reusable page templates"
      - "SCSS — consistent design system across all pages"
      - "JavaScript — search and filter logic for the resource directory"
      - "GitHub Pages — free, reliable hosting with CI/CD deployment"
      - "Formspree — contact form backend, no server required"
      - "JWT Auth (adapted from OCS) — role-based login for PNEC"
    impact:
      - "Individual issue (Ethan): define which 3 emergency actions appear on the homepage hero with direct CTA buttons."
      - "Individual issue (Aneesh): wire the Get Involved button through to a complete volunteer onboarding page."
      - "Individual issue (Samarth): audit all content pages and enforce a shared template standard for announcements."
      - "Shared issue: reduce duplicate pages that fragment key preparedness info into one clear source."
      - "Login plan: volunteer sees their neighborhood dashboard, coordinator edits local pages, admin manages the full site."
