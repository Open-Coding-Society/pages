title: Community Health Foundation
description: Supporting healthcare programs that improve lives across our community.
mission_statement: We expand access to quality healthcare by funding local programs, prevention services, and patient support across our region.
donate_link: /donate
support_link: /donate
impact_link: /capstone/palomarhealth/#impact

homepage_spotlight:
  overview: Palomar Health is the largest public healthcare district in California, serving North San Diego County through multiple hospitals and healthcare facilities.
  metrics:
    - value: "280-300"
      label: Emergency department patients per day
    - value: "70-90"
      label: Ambulance arrivals each day
    - value: "1,400"
      label: Patients treated yearly at the rehabilitation institute
    - value: "120"
      label: Beds planned in the new behavioral health center
  expansion_title: Growth in Progress
  expansion_description: The system continues expanding its care footprint with a new 120-bed behavioral health center to support rising regional demand.

