donation_summary: Every contribution stays local and directly supports families, students, and patients who need timely access to care.

donation_tiers:
  - amount: "$25"
    description: Supports patient care supplies
  - amount: "$100"
    description: Supports community health programs
  - amount: "$500"
    description: Supports medical equipment

donation_impact:
  - title: Expand Preventive Care
    description: Donations fund screenings, wellness education, and early intervention services that reduce long-term health risks.
  - title: Strengthen Youth Programs
    description: Community support keeps mentorship and healthcare career pathways available to students across our schools.
  - title: Support Families in Crisis
    description: Gifts help provide trauma-informed support, care coordination, and recovery resources when families need them most.

