 - title: "ML Cancer Risk Calculator"
   image: "capstone/acs_logo.png"
   link: "/cancerrisk"
   alt: "ML Cancer Risk Calculator — Personalized cancer risk prediction"
   keyPoints:
     - "Ensemble ML model (Logistic Regression + Random Forest + Decision Tree)"
     - "Inputs cover demographics, lifestyle, medical history, and environment"
     - "Returns overall relative risk multiplier vs. the US population baseline"
     - "Per-cancer-type lifetime risk estimates for up to 12 cancer types"
     - "Feature importance chart shows which factors drive your prediction"
     - "Full bilingual support — English and Spanish"
   subtitle: "Your Risk. Explained by Machine Learning."
   description: "An interactive risk assessment tool that uses an ensemble machine learning model to estimate a user's relative cancer risk compared to the average US population. Users answer questions about age, sex, race/ethnicity, smoking, BMI, alcohol, physical activity, diet, medical history, and environmental exposures. The model returns an overall relative risk multiplier, per-cancer-type lifetime risk percentages, a key risk factor breakdown, and a feature importance chart. A built-in AI chat assistant — personalized to the user's filled-in profile and prediction results — answers follow-up questions in plain English. The interface is fully bilingual in English and Spanish."
   tech:
     - "Ensemble ML Model"
     - "Python Flask Backend"
     - "Claude AI Chat Integration"
     - "Bilingual i18n (EN/ES)"
     - "Animated SVG Gauges"
     - "GitHub Pages + API"
   impact:
     - "Translates complex epidemiological data into a personalized risk score"
     - "Empowers users to understand which lifestyle factors affect their cancer risk"
     - "Bilingual design improves access for Spanish-speaking communities"
     - "AI assistant explains results in plain language without medical jargon"
     - "Encourages proactive screening conversations with healthcare providers"
   status: "In Development"
   team:
