     - "Varada"

 - title: "Cell Cycle & Cancer Lab"
   image: "capstone/acs_logo.png"
   link: "/cyclegame/"
   alt: "Cell Cycle and Cancer Interactive Lab — Educational simulation"
   keyPoints:
     - "Animated cell cycle wheel walks through G1, S, G2, and M phases"
     - "Toggle tumor suppressor and oncogene switches to see real-time effects"
     - "Apply UV, tobacco, heavy metal, and inherited mutation disruptors"
     - "Checkpoint gate quizzes unlock each phase — learn before advancing"
     - "Live DNA damage visualization and mutation load meter"
     - "Gene deep-dive covers p53, Rb, RAS, BRCA1 with clinical stats"
   subtitle: "See Cancer Start. One Gene at a Time."
   description: "An interactive educational simulation that teaches how the cell cycle works and how it breaks down in cancer. Users navigate through the four phases of the cell cycle — G1, S, G2, and M — unlocking each phase by answering checkpoint gate questions. A gene control panel lets users toggle p53, Rb, RAS, and BRCA1 on and off to see how each mutation affects the cycle in real time. Disruptor cards simulate UV radiation, tobacco smoke, heavy metals, and inherited mutations, triggering animated DNA damage events and updating a live mutation load meter. A final Gene Deep-Dive section covers proto-oncogenes, oncogenes, tumor suppressors, and p53 in clinical detail."
   tech:
     - "HTML5 Canvas Animation"
     - "Interactive Checkpoint Quizzes"
     - "Real-time Gene Toggle Panel"
     - "DNA Damage Visualization"
     - "Particle FX System"
     - "Score & Progress Tracking"
   impact:
     - "Makes cell biology tangible through hands-on simulation rather than static diagrams"
     - "Checkpoint quizzes reinforce learning before advancing — proven pedagogical model"
     - "Gene toggles build intuition for how tumor suppressors and oncogenes interact"
     - "Disruptor cards connect environmental risk factors to molecular-level damage"
     - "Supports AP Biology, college biology, and patient education use cases"
   status: "In Development"
   team:
     - "Aashika"
     - "Anwita"
     - "Varada"