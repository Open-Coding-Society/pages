# ── Feature Demos ───────────────────────────────────────────
# Three flagship surfaces, in the RCR phase-card format.
FeatureDemos:
  - title: "AI Classification Pipeline"
    subtitle: "Plain-English → correct SFI spec in a single call"
    status: "Phase 1 · Shipped"
    phase: "AI Pipeline"
    leads: "Aditya Srivastava, Dhyan Soni, Aaryav Lal"
    link: "https://sfifoundation.opencodingsociety.com/spec-search"
    alt: "AI classifier terminal output — part description resolved to SFI spec and category"
    current: "Inspectors and manufacturers cross-reference seven static category pages to find the right spec number — minutes lost per lookup, and easy to land on the wrong standard."
    purpose: "A TF-IDF + LinearSVC pipeline trained on 136 augmented SFI entries takes any part description — 'carbon fire jacket', 'nitrous bottle', 'kart helmet' — and returns the correct spec and category with a confidence score. Synonym expansion handles the vocabulary gap between everyday language and the SFI lexicon."
    keyPoints:
      - "Classifies free-text descriptions to spec + category with confidence"
      - "Top-N ranked predictions, not just a single guess"
      - ">95% precision on held-out evaluation set"
      - "Synonym expansion for driver-facing language"
    tech:
      - "scikit-learn (TF-IDF + LinearSVC)"
      - "NumPy / SciPy softmax"
      - "Flask-RESTful API"
      - "SQLAlchemy model cache"
    impact:
      - "Spec lookup drops from minutes to a single query"
      - "Reduces categorization error at trackside inspection"
      - "API-ready for venue and manufacturer tooling"
    demoType: "terminal"
    demoLines:
      - "$ POST /api/sfi/classify"
      - '  input: "carbon fiber racing jacket, flame-resistant"'
      - ""
      - "→ spec:        SFI 3.2A/5"
      - "→ category:    Driver Apparel"
      - "→ confidence:  0.947"
      - "→ runner-up:   SFI 3.3 · Gloves · 0.062"

  - title: "Spec Search & Visual Browser"
    subtitle: "Fuzzy search across 140+ standards — and a car diagram you can click"
    status: "Phase 1 · Shipped"
    phase: "Spec Search"
    leads: "Aditya Srivastava, Dhyan Soni, Aaryav Lal"
    link: "https://sfifoundation.opencodingsociety.com/spec-search"
    alt: "Spec search results list with category filters and live stat bar"
    current: "SFI specs are scattered across static category pages. You have to know the exact naming convention before the site is useful, which is the opposite of how search should work."
    purpose: "A client-side Levenshtein + cosine index sits on top of the live database. Typos survive, abbreviations resolve, and results are filterable by the seven racing disciplines. A 'did you mean?' layer catches the near-misses, and an interactive car diagram lets you browse the same data visually — click a roll cage, get the cage spec."
    keyPoints:
      - "Keyword search across spec numbers, names, categories, subcategories"
      - "Typo-tolerant with 'did you mean?' suggestions"
      - "Filter by discipline — drag, circle, oval, karting, off-road, junior, powerboat"
      - "Interactive car diagram maps components to certifications"
    tech:
      - "JS Levenshtein + cosine scoring"
      - "Flask + SQLAlchemy"
      - "SQLite (sfi_specs)"
      - "HTML5 Canvas overlays"
    impact:
      - "1–2 searches vs. 5–10 clicks across static pages"
      - "Usable without memorizing SFI naming conventions"
      - "Doubles as a reference for new manufacturers preparing submissions"
    demoType: "search"
    demoQuery: "fire suit junior"
    demoResults:
      - spec: "SFI 3.2A/1"
        name: "Driver Suit — Junior Dragster"
        cat: "Apparel · Junior"
        match: "98%"
      - spec: "SFI 3.2A/5"
        name: "Driver Suit — Multi-Layer FR"
        cat: "Apparel · Adult"
        match: "91%"
      - spec: "SFI 40.1"
        name: "Junior Dragster Helmet"
        cat: "Head Protection"
        match: "74%"

  - title: "Admin Part Inventory"
    subtitle: "Staff-operated CRUD dashboard — no deploy, no developer"
    status: "Phase 2 · Shipped"
    phase: "Admin Console"
    leads: "Aditya Srivastava, Dhyan Soni, Aaryav Lal"
    link: "https://sfifoundation.opencodingsociety.com/admin"
    alt: "Admin inventory table showing spec records with edit and delete controls"
    current: "Adding a new spec meant editing raw HTML and waiting on a developer. That friction is why the public site was perpetually out of date relative to the standards SFI actually published."
    purpose: "The admin console gives SFI staff a role-gated dashboard to add, edit, or retire specs directly. Every change is a database transaction, so there's a clean audit trail, and the public surfaces (search, AI, diagram) pick up the update on the next request. No deploy, no merge conflict, no stale PDF."
    keyPoints:
      - "Role-gated CRUD for the full SFI spec table"
      - "Live summary stats — totals, per-category counts, effective dates"
      - "Inline validation with success / error toasts"
      - "Single source of truth for downstream search + AI"
    tech:
      - "Flask Blueprints + @login_required"
      - "SQLAlchemy transactional ORM"
      - "Jinja2 admin accordion"
      - "Bootstrap 5 components"
    impact:
      - "Standards go live the day they're published, not the next sprint"
      - "Auditable change history via DB commits"
      - "Removes developers from the critical path for content updates"
