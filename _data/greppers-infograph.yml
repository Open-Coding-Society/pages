Badge: "Design-Based Research Capstone"
Title: "SFI Foundation — Web Modernization"
Description: "A capstone project reimagining the SFI Foundation's digital presence. We propose a suite of frontend, backend, and data-driven improvements to a motorsports safety standards organization serving sanctioning bodies worldwide — making spec lookup, manufacturer verification, and safety guidance dramatically faster and more accessible."

Topics:
  - title: "Smart Spec Search Engine"
    subtitle: "AI-Powered Specification & Manufacturer Lookup"
    icon: "🔍"
    status: "Proposed"
    featureArea: "Frontend + ML"
    link: "#"
    buttonLabel: "View Concept"
    keyPoints:
      - "Full-text search across all SFI spec documents (currently scattered across 8 separate pages)"
      - "Filter by spec number, product category, recertification period, or manufacturer"
      - "Semantic search: type 'helmet' or 'fire suit' and get the right spec, not just keyword matches"
      - "Live manufacturer count and certification status badges per spec"
      - "Responsive, mobile-friendly results with instant client-side filtering"
    tech:
      - "React / Preact"
      - "Fuse.js Fuzzy Search"
      - "Python PDF Parser"
      - "Sentence Transformers"
      - "Flask API"
      - "JSON Data Layer"
    description: "Right now, finding an SFI spec requires clicking through 8 category pages with plain HTML tables. We'd scrape and parse all spec PDFs into a structured JSON dataset, then build a single unified search UI. A lightweight embedding model enables semantic queries so a tech inspector can type a plain-English question and get an accurate match — no memorizing spec numbers needed."
    impact:
      - "⏱ Reduces spec lookup time from minutes to seconds"
      - "🏁 Helps tech inspectors at race events verify gear on the spot"
      - "📋 Consolidates 8 fragmented pages into one experience"
      - "🔎 First genuinely searchable SFI specification index"

  - title: "Manufacturer Verification Portal"
    subtitle: "Public QR-Based Certification Lookup"
    icon: "🏷️"
    status: "Proposed"
    featureArea: "Backend + UX"
    link: "#"
    buttonLabel: "View Concept"
    keyPoints:
      - "Manufacturer dashboard: submit/renew product certifications with a clean logged-in portal"
      - "Unique QR code generated per certified product linking to its live SFI certification record"
      - "Public verification page — scan a tag on gear and instantly see spec number, cert date, recertification due"
      - "Admin panel for SFI staff to approve, flag, or expire certifications"
      - "Email/notification system for upcoming recertification deadlines"
    tech:
      - "Next.js / SSR"
      - "PostgreSQL"
      - "JWT Auth"
      - "QR Code API"
      - "SendGrid Email"
      - "REST API"
    description: "Currently, manufacturer lists are static HTML tables maintained manually. We'd replace this with a proper database-backed portal where manufacturers self-manage their certified products. A QR code on each product sticker links to a live verification page — giving race officials, drivers, and buyers instant confidence that gear is genuinely SFI-certified and hasn't expired."
    impact:
      - "🛡️ Reduces counterfeit / expired gear at race events"
      - "📱 Instant mobile verification with a phone scan"
      - "⚙️ Removes SFI staff bottleneck for list updates"
      - "📬 Automated alerts prevent lapsed certifications"

  - title: "Modern UI Redesign"
    subtitle: "Clean, Accessible, Mobile-First Visual Overhaul"
    icon: "🎨"
    status: "Proposed"
    featureArea: "UI / Frontend"
    link: "#"
    buttonLabel: "View Concept"
    keyPoints:
      - "Responsive navigation replacing the current static multi-level dropdown that breaks on mobile"
      - "Hero section with real imagery and clear CTAs instead of a broken Revolution Slider"
      - "Design system with consistent typography, spacing, and brand colors across all pages"
      - "Accessible components (WCAG 2.1 AA): proper focus states, aria labels, contrast ratios"
      - "Dark/light mode toggle and improved page load performance (remove heavy slider plugin)"
    tech:
      - "HTML / CSS / JS"
      - "Tailwind CSS"
      - "WordPress Theme"
      - "WCAG 2.1 AA"
      - "Lighthouse Perf"
    description: "The current site loads with a broken image slider, uses inconsistent fonts across pages, and is nearly unusable on mobile — a major issue for track-side officials. We'd propose a clean WordPress child theme or static redesign that preserves all content while delivering a professional, fast, and accessible experience that reflects SFI's standing as the global motorsports safety standard."
    impact:
      - "📱 Fully usable on pit-lane mobile devices"
      - "♿ WCAG-compliant for all users"
      - "⚡ Estimated 60%+ improvement in page load time"
      - "🏆 Design matching SFI's global safety authority"
