Title: "NodCursor Capstone"
Description: "A Research Through Design capstone for a browser-based, privacy-first head-tracking cursor controller that maps head motion and facial gestures to mouse events using MediaPipe. Seamlessly integrated across site-wide accessibility features and gamified learning experiences at Open Coding Society."

Topics:
  # Core NodCursor System
  - title: "NodCursor Core Engine"
    subtitle: "Head tracking, gesture detection, and real-time processing"
    keyPoints:
      - "Browser-native head tracking via MediaPipe FaceLandmarker"
      - "Facial gestures mapped to click, scroll, and drag events"
      - "Web Worker pipeline for real-time smoothing with minimal latency"
      - "Exponential smoothing with deadzone and acceleration curve"
      - "Blink, double-blink, and long-blink gesture detection"
    description: "The NodCursor engine is a lightweight, privacy-first head-tracking system powered by MediaPipe Tasks Vision. It runs entirely in the browser, analyzing facial landmarks to derive cursor position and gesture signals without any server communication. A Web Worker pipeline handles exponential smoothing and acceleration off the main thread, keeping the UI responsive even under heavy gesture load."
    tech:
      - "MediaPipe Tasks Vision"
      - "Web Worker"
      - "React Hooks"
      - "TypeScript"
      - "Exponential Smoothing"
    impact:
      - "Fully browser-native, no app or plugin required"
      - "Privacy-first: all inference runs on-device"
      - "Accessible cursor control for motor-impaired users"
      - "Smooth, responsive tracking across varied lighting"
    status: "Deployed"
    team:
      - "Aadi Bhat"
      - "Pranav Santhosh"

  - title: "Site-Wide Accessibility & Preferences"
    subtitle: "Calibration, theme customization, TTS, and translation"
    keyPoints:
      - "Calibration system mapping head range to viewport coordinates"
      - "Global site preferences engine (theme, font, language, voice)"
      - "Text-to-Speech (TTS) integration with voice selection & pitch control"
      - "Google Translate integration with cookie persistence"
      - "Tailwind override stylesheet for theme persistence"
      - "localStorage persistence across browser sessions"
    description: "NodCursor is integrated into the site-wide accessibility framework. Users calibrate their head motion range once, then enjoy persistent preferences across all pages. The preferences engine manages theme customization (colors, fonts, sizes), text-to-speech settings (voice, rate, pitch), and multi-language support via Google Translate. All settings sync to localStorage and can be saved server-side when logged in."
    tech:
      - "LocalStorage API"
      - "CSS Custom Properties"
      - "Google Translate API"
      - "Web Speech API"
      - "Tailwind CSS"
      - "SCSS"
    impact:
      - "Consistent accessibility experience across the entire platform"
      - "User preferences persist across sessions"
      - "Multi-language learners supported with translation"
      - "Text-to-speech enables auditory learners"
      - "Theme customization improves readability for all users"
    status: "Deployed"
    team:
      - "Aadi Bhat"

  # Gamification Section
  - title: "Gamification: Empathy Epic"
    subtitle: "Five learning stations exploring collaborative software development"
    keyPoints:
      - "Five interactive learning stations (Active Listener, Perspective Taker, Supportive Collaborator, Respectful Communicator, Inclusive Thinker)"
      - "Each station presents a real-world scenario and a quiz with correct + distractor answers"
      - "Stations use color-coded markers (blue → green on completion, red on failure)"
      - "Dialogue system with NPC interactions at each station"
      - "Head tracking enables station navigation via cursor control"
    description: "Empathy Epic is a gamified learning experience that teaches collaborative software development through five interactive stations. Players navigate a digital world using head tracking, approaching each station to engage with scenario-based quizzes. The game emphasizes soft skills like active listening, perspective-taking, and inclusive thinking; essential for professional teamwork. Each quiz shuffles answers and uses visual feedback (color changes) to reinforce learning."
    tech:
      - "Canvas Rendering"
      - "NPC Dialogue System"
      - "Head Tracking Integration"
      - "Quiz Engine with Randomization"
      - "Game State Management"
    impact:
      - "Teaches empathy & collaboration through play"
      - "Head tracking makes navigation accessible & engaging"
      - "Scenario-based learning improves retention"
      - "Visual feedback reinforces correct answers"
      - "Bridges accessibility and soft skills development"
    status: "Deployed"
    team:
      - "Aadi Bhat"

  - title: "Gamification: Nod Maze Game"
    subtitle: "Multi-level head-tracking maze challenge"
    keyPoints:
      - "Three progressive difficulty levels with increasingly complex wall patterns"
      - "Player controls a cyan circle via head tracking (head position → cursor → player movement)"
      - "Collision detection against static walls"
      - "Exit zone activation on reaching the goal"
      - "Lives system (5 lives per run) with game-over and win states"
      - "HUD displays level, lives remaining, and elapsed time"
    description: "Nod Maze is a head-tracking game that challenges players to navigate a circular avatar through increasingly complex mazes without hitting walls. Movement is driven entirely by head position via the NodCursor system, making it both an engaging game and a practical motor-control exercise. The three-level progression teaches fine motor control, spatial reasoning, and persistence while providing immediate tactile feedback for head tracking calibration."
    tech:
      - "Canvas 2D"
      - "Head Tracking Input"
      - "Collision Detection"
      - "Game Loop (60 FPS)"
      - "HUD Management"
    impact:
      - "Provides real-time feedback on head tracking accuracy"
      - "Builds muscle memory for head-based cursor control"
      - "Engages motor-impaired learners in physical challenges"
      - "Three-level progression supports mastery learning"
      - "Accessible alternative to mouse-based games"
    status: "Deployed"
    team:
      - "Aadi Bhat"

