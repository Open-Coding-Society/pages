patient_stories:
  - title: "Dvořák in America"
    summary: "The orchestra opened its 2025-2026 season with an all-Dvořák program featuring Symphony No. 9 and the Cello Concerto with guest soloist Cello (Qiele) Guo."
    results:
      - "Presented a major symphonic masterwork for regional audiences"
      - "Featured an acclaimed guest soloist in a centerpiece concerto performance"
      - "Opened the season with a program built around melody, heritage, and emotional depth"
    impact: "Signature performances help strengthen the region’s access to high-quality live classical music."
    link: "/concerts"

  - title: "Mendelssohn Classics"
    summary: "This March 2026 concert features Mendelssohn’s Symphony No. 5, the Violin Concerto, and Beethoven’s Overture to Fidelio with YuEun Gemma Kim as guest soloist."
    results:
      - "Continues the current season with a Romantic-era concert experience"
      - "Brings guest artistry and orchestral repertoire together on one stage"
      - "Offers audiences expressive and dramatic symphonic works in a local venue"
    impact: "Carefully programmed concerts deepen cultural enrichment and audience engagement across the community."
    link: "/concerts"

  - title: "An American Celebration"
    summary: "The May 2026 finale celebrates America’s 250th birthday with music by Copland, Gershwin, and Bernstein, highlighted by Rhapsody in Blue with pianist Dan Yu."
    results:
      - "Connects national history with iconic American symphonic music"
      - "Showcases crossover appeal through one of the best-known concert works in the repertoire"
      - "Closes the season with energy, familiarity, and broad audience appeal"
    impact: "Season finales create memorable community events that invite both longtime patrons and new listeners into the concert hall."
    link: "/concerts"

community_voices:
  - title: "Audience Appreciation"
    story: "For more than two decades, audiences from Poway and the wider North County Inland region have returned to hear live symphonic music performed close to home. The orchestra’s continued presence has helped make classical music a meaningful part of local cultural life."
    impact: "Consistent access to live performance strengthens cultural identity and community connection."

  - title: "Musician Opportunity"
    story: "The orchestra welcomes qualified musicians of many ages and backgrounds, creating opportunities to perform serious symphonic literature in a high-quality ensemble setting. This supports both artistic growth and shared community participation."
    impact: "Performance access helps musicians stay engaged, challenged, and connected through meaningful artistic work."

  - title: "Volunteer and Donor Support"
    story: "Volunteers, donors, and sponsors all play a role in sustaining concerts and organizational operations. Their support helps ensure that performances remain accessible and that the orchestra can continue serving the region year after year."
    impact: "Community-backed arts organizations build long-term cultural value through shared investment and local stewardship."

program_impact:
  - title: "Mainstage Concert Season"
    audience: "Community members, families, students, and classical music patrons across North County Inland San Diego"
    highlights:
      - "Three symphonic performances each year"
      - "Concerts presented at the Poway Center for the Performing Arts"
      - "Programs featuring major repertoire and guest soloists"
    outcome: "Audiences gain local access to live orchestral music of high artistic quality without needing to travel outside the region."

  - title: "Musician Participation and Growth"
    audience: "Qualified musicians of varied ages, backgrounds, and experience levels"
    highlights:
      - "Rehearsals held on Monday evenings"
      - "Opportunities to perform Classical, Romantic, and Contemporary literature"
      - "Special interest in expanding and strengthening string sections"
    outcome: "The orchestra creates a strong artistic home for musicians while sustaining a vibrant performance tradition in the community."

