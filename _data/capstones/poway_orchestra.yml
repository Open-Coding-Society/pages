homepage_spotlight:
  overview: "Formed in 2004, the Poway Symphony Orchestra presents three symphonic concerts each year at the Poway Center for the Performing Arts and serves audiences across San Diego’s North County Inland region."
  metrics:
    - value: "3"
      label: "Symphonic concerts presented each year"
    - value: "67"
      label: "Musicians performing in the orchestra"
    - value: "20+"
      label: "Years of cultural enrichment in the region"
    - value: "$25,000"
      label: "Current matching gift challenge goal"
  expansion_title: "A Stronger Future Through Community Support"
  expansion_description: "Gifts, sponsorships, and volunteer support help sustain concerts, bring guest artists to the stage, and strengthen access to live classical music in Poway and nearby communities."

