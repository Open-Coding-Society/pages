patient_stories:
  - title: Weight Loss Surgery Success - Charlene Patterson
    summary: Charlene faced serious health challenges and low confidence before receiving gastric bypass surgery through Palomar Health.
    results:
      - Lost about 100 pounds after surgery and follow-up support
      - Completed a triathlon with swimming, biking, and running
      - Built long-term habits through staff guidance and support groups
    impact: This journey shows how coordinated care and recovery support can improve both physical health and emotional well-being.
    link: /stories/charlene-patterson
  - title: Advanced Wound Care Recovery - Cecilia DeFabio
    summary: After surviving breast cancer, Cecilia developed a severe wound that required specialized intervention and close medical coordination.
    results:
      - Received hyperbaric oxygen therapy to support tissue healing
      - Restored blood flow that enabled a successful skin graft
      - Benefited from a team-based care model focused on whole-patient recovery
    impact: This case demonstrates how advanced technology and multidisciplinary care can help patients recover from complex complications.
    link: /stories/cecilia-defabio
  - title: Stroke Rehabilitation Recovery - David M.
    summary: Following a stroke, David entered a multidisciplinary rehabilitation program focused on mobility, speech, and independence.
    results:
      - Completed intensive physical and occupational therapy milestones
      - Regained confidence with daily movement and communication
      - Returned to family activities with improved independence
    impact: Rehabilitation services helped restore function and quality of life during a critical recovery period.
    link: /stories/david-stroke-recovery

community_voices:
  - title: Camp HOPE Parent Reflection
    story: A parent shared that Camp HOPE gave their child a rare sense of safety and belonging after prolonged family trauma. Through mentorship, team activities, and consistent follow-up events, the child became more confident at school and more engaged at home.
    impact: Donor-funded trauma-informed programs can create stability for entire families, not only individual participants.
  - title: Student Healthcare Pathway Story
    story: A local middle school student entered the Middle School M.D. program uncertain about future goals, then discovered a passion for emergency care after CPR and first-aid simulations with clinical staff.
    impact: Early exposure to healthcare careers helps students build purpose, practical skills, and long-term community commitment.
  - title: Community Mentor Perspective
    story: A volunteer mentor described how year-round outreach events connect youth with trusted adults and healthy peer networks, helping participants stay supported long after a single workshop or camp session ends.
    impact: Sustained support models strengthen resilience and improve long-term outcomes across neighborhoods.

program_impact:
  - title: Camp HOPE
    audience: Children and teens who have experienced abuse or trauma
    highlights:
      - Week-long therapeutic summer camp experiences
      - Mentorship and positive role-model relationships
      - Confidence-building activities and year-round support events
    outcome: Participants gain safety, confidence, and community support that help them move forward with hope.
  - title: Middle School M.D.
    audience: Local middle school students exploring healthcare careers
    highlights:
      - Hands-on medical workshops and first-aid training
      - CPR and defibrillator practice with guided instruction
      - Direct interaction with doctors, nurses, and healthcare staff
    outcome: Students build practical skills and interest in healthcare careers that strengthen the future regional workforce.

