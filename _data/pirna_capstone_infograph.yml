    description: "Student collaboration and movement tracking on OCS historically occurred off-platform, reducing administrative visibility. To resolve this, we are engineering a robust full-stack solution. For communication, the platform supports real-time group chat via WebSockets and secure file attachments stored on AWS S3. For physical tracking, it incorporates a Bathroom/Hall Pass queue featuring a facial recognition API and secure face data storage in the Spring Boot backend, an automated queue-clearing mechanism responsive to audio bell frequencies, and admin analytics to log and analyze the duration of hall pass usage for each user."
